<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Story Master Hub — Epic Quest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
/* ══════════════════════════════════════════════
   RESET & TOKENS — iPad-first, legibility-first
   ══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f3f2ee;--surface:#fff;--surface2:#f9f8f5;
  --ink:#1a1a1a;--ink2:#444;--ink3:#666;--ink4:#999;
  --border:#ddd9d0;--border2:#ccc8be;
  --gold:#8a6f0a;--gold-light:#f0ead0;--gold-pale:#f8f5e8;
  --red:#b02828;--red-light:#fae8e8;
  --blue:#2858a0;--blue-light:#e6eefc;
  --green:#247038;--green-light:#e4f2ea;
  --purple:#6030a0;--purple-light:#ede6fa;
  --orange:#a06010;--orange-light:#faf0e2;
  --sidebar:#1c1d2e;--sidebar2:#282940;--sidebar3:#333455;
  --sidebar-text:#b0b1c8;--sidebar-dim:#7a7b9a;
  --r:8px;--r-lg:12px;
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
  --serif:Georgia,serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:15px;color:var(--ink);background:var(--bg);display:flex}

/* ══════════════════════════════════════════════
   SIDEBAR — touch-friendly, no clutter
   ══════════════════════════════════════════════ */
.sidebar{
  width:180px;min-width:180px;background:var(--sidebar);
  display:flex;flex-direction:column;padding:16px 8px;
  overflow-y:auto;user-select:none;-webkit-overflow-scrolling:touch;
}
.sidebar::-webkit-scrollbar{display:none}
.sb-brand{text-align:center;margin-bottom:4px}
.sb-brand-name{color:#c9a84c;font-size:14px;font-weight:800;letter-spacing:2px}
.sb-brand-sub{color:var(--sidebar-dim);font-size:10px;letter-spacing:.5px}
.sb-campaign{
  background:var(--sidebar2);border:1px solid var(--sidebar3);
  border-radius:var(--r);padding:10px;margin:10px 0 16px;
}
.sb-campaign-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:.8px;font-weight:700}
.sb-campaign-name{color:#e8e8f0;font-size:13px;font-weight:700;margin-top:3px}
.sb-campaign-session{color:var(--sidebar-text);font-size:11px;margin-top:2px}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 10px;border-radius:var(--r);min-height:44px;
  cursor:pointer;border:1px solid transparent;
}
.sb-item:active{background:var(--sidebar2)}
.sb-item.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3)}
.sb-item-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sb-item-name{font-size:13px;font-weight:600;color:var(--sidebar-text)}
.sb-item.active .sb-item-name{color:#c9a84c}
.sb-divider{border:none;border-top:1px solid var(--sidebar3);margin:12px 4px}
.sb-players{margin-top:auto;padding-top:12px}
.sb-players-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:8px}
.sb-player-list{display:flex;justify-content:center;gap:8px}
.sb-player{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}
.sb-settings{
  margin-top:12px;padding:10px;border-radius:var(--r);min-height:44px;
  text-align:center;cursor:pointer;border:1px solid var(--sidebar3);
  color:var(--sidebar-dim);font-size:11px;display:flex;align-items:center;justify-content:center;
}
.sb-settings:active{background:var(--sidebar2);color:var(--sidebar-text)}

/* ══════════════════════════════════════════════
   MAIN AREA
   ══════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;min-height:50px;
}
.breadcrumb{font-size:13px;color:var(--ink3)}
.breadcrumb span{color:var(--ink);font-weight:600}
.topbar-spacer{flex:1}
.btn{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;font-family:var(--font);cursor:pointer;
  border:1px solid var(--border);background:var(--surface);
  color:var(--ink2);display:inline-flex;align-items:center;gap:6px;
  min-height:44px;
}
.btn:active{background:var(--bg);border-color:var(--border2)}
.btn-gold{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.btn-primary{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-primary:active{background:#6a5808}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* ══════════════════════════════════════════════
   VIEW SYSTEM
   ══════════════════════════════════════════════ */
.view{display:none}
.view.active{display:block}

/* ══════════════════════════════════════════════
   SECTION HEADERS
   ══════════════════════════════════════════════ */
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px}
.section-desc{font-size:14px;color:var(--ink3);margin-bottom:16px;line-height:1.5}

/* ══════════════════════════════════════════════
   CAMPAIGN: BEATS
   ══════════════════════════════════════════════ */
.beats-row{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.beat-card{
  flex:0 0 190px;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;
}
.beat-card:active{border-color:var(--gold)}
.beat-card.active{border-color:var(--gold);background:var(--gold-pale)}
.beat-card.dim{opacity:.4}
.beat-card .beat-num{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.beat-card .beat-name{font-size:15px;font-weight:700;color:var(--ink);margin-top:4px;font-family:var(--serif)}
.beat-card .beat-status{font-size:11px;color:var(--ink3);margin-top:6px}
.beat-card .beat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.beat-card .beat-fill{height:100%;background:var(--gold);border-radius:2px}
.beat-connector{flex-shrink:0;display:flex;align-items:center;color:var(--border2);font-size:16px}

/* ══════════════════════════════════════════════
   CAMPAIGN: SCENE CARDS
   ══════════════════════════════════════════════ */
.scenes-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.scenes-header .section-label{margin:0}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.scene-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:16px;cursor:pointer;
  position:relative;overflow:hidden;
}
.scene-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.scene-card.combat::before{background:var(--red)}
.scene-card.social::before{background:var(--blue)}
.scene-card.exploration::before{background:var(--green)}
.scene-card.revelation::before{background:var(--purple)}
.scene-card.sporadic::before{background:var(--gold)}
.scene-card.sporadic{border-style:dashed}
.scene-badge{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;margin-bottom:8px}
.badge-combat{background:var(--red-light);color:var(--red)}
.badge-social{background:var(--blue-light);color:var(--blue)}
.badge-exploration{background:var(--green-light);color:var(--green)}
.badge-revelation{background:var(--purple-light);color:var(--purple)}
.badge-sporadic{background:var(--gold-pale);color:var(--gold)}
.scene-status{float:right;font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r)}

.status-active{background:var(--gold-pale);color:var(--gold)}
.status-ready{background:var(--bg);color:var(--ink3)}
.scene-card .scene-name{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;font-family:var(--serif)}
.scene-card .scene-detail{font-size:13px;color:var(--ink3);line-height:1.5;margin-bottom:2px}
.scene-flag{margin-top:10px;padding:8px 10px;border-radius:var(--r);font-size:12px;line-height:1.4;border:1px dashed}
.flag-consequence{background:rgba(176,40,40,.04);border-color:var(--red);color:var(--red)}
.flag-personal{background:rgba(96,48,160,.04);border-color:var(--purple);color:var(--purple)}

/* ══════════════════════════════════════════════
   SCENE BUILDER
   ══════════════════════════════════════════════ */
.builder-layout{display:flex;gap:16px}
.builder-main{flex:1;min-width:0}
.builder-side{width:280px;min-width:280px}
@media(max-width:900px){
  .builder-layout{flex-direction:column}
  .builder-side{width:100%;min-width:0}
}
.builder-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.builder-tab{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;
}
.builder-tab:active{background:var(--bg)}
.builder-tab.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}


.builder-panel{display:none}
.builder-panel.active{display:block}
.form-section{margin-bottom:20px}
.form-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:8px}
.form-input{
  width:100%;padding:12px 14px;border:2px solid var(--border);
  border-radius:var(--r);font-size:15px;font-family:var(--font);
  color:var(--ink);background:var(--surface2);resize:vertical;
}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--ink4)}
textarea.form-input{min-height:70px;line-height:1.5}
.stakes-row{display:flex;gap:10px}
@media(max-width:700px){.stakes-row{flex-direction:column}}
.stake-box{flex:1;padding:14px;border-radius:var(--r-lg);border:2px dashed}
.stake-fail{background:rgba(176,40,40,.03);border-color:var(--red)}
.stake-win{background:rgba(36,112,56,.03);border-color:var(--green)}
.stake-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.stake-fail .stake-label{color:var(--red)}
.stake-win .stake-label{color:var(--green)}
.stake-box .form-input{background:transparent;border-color:transparent}
.stake-box .form-input:focus{border-color:inherit}

/* TYPE SELECTOR — color dots, no emoji */
.type-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.type-option{
  padding:10px 18px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;font-size:14px;font-weight:600;background:var(--surface);
  min-height:44px;display:flex;align-items:center;gap:8px;color:var(--ink2);
}
.type-option .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.type-option.selected{border-width:2px}
.type-option[data-type="combat"] .dot{background:var(--red)}
.type-option[data-type="social"] .dot{background:var(--blue)}
.type-option[data-type="exploration"] .dot{background:var(--green)}
.type-option[data-type="revelation"] .dot{background:var(--purple)}
.type-option[data-type="combat"].selected{border-color:var(--red);background:var(--red-light);color:var(--red)}
.type-option[data-type="social"].selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.type-option[data-type="exploration"].selected{border-color:var(--green);background:var(--green-light);color:var(--green)}
.type-option[data-type="revelation"].selected{border-color:var(--purple);background:var(--purple-light);color:var(--purple)}

/* ══════════════════════════════════════════════
   LAIR ACTIONS — checkboxes, not chips
   ══════════════════════════════════════════════ */
.lair-section{padding:14px;border-radius:var(--r-lg);background:var(--orange-light);border:2px dashed var(--orange)}
.lair-check{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;color:var(--ink2);cursor:pointer}
.lair-check input[type="checkbox"]{width:20px;height:20px;accent-color:var(--orange)}
.combat-only{display:none}
.combat-only.visible{display:block}

/* ══════════════════════════════════════════════
   NPC / CREATURE / LOOT CARDS
   ══════════════════════════════════════════════ */
.npc-card,.creature-card,.loot-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;
}
.npc-card .npc-name,.creature-card .creature-name,.loot-card .loot-name{font-size:15px;font-weight:700;font-family:var(--serif)}
.npc-card .npc-role,.creature-card .creature-type,.loot-card .loot-type{font-size:12px;color:var(--ink3);margin-top:2px}
.npc-card .npc-detail,.creature-card .creature-abilities,.loot-card .loot-desc{font-size:13px;color:var(--ink2);margin-top:8px;line-height:1.5}
.npc-card .npc-voice{font-size:14px;color:var(--gold);font-style:italic;margin-top:6px}
.creature-stats-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.creature-stat{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.creature-stat.hp{background:var(--red-light);color:var(--red);border-color:var(--red)}
.creature-stat.dmg{background:var(--orange-light);color:var(--orange);border-color:var(--orange)}
.creature-stat.special{background:var(--purple-light);color:var(--purple);border-color:var(--purple)}
.difficulty-tag{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.diff-easy{background:var(--green-light);color:var(--green)}
.diff-medium{background:var(--orange-light);color:var(--orange)}
.diff-hard{background:var(--red-light);color:var(--red)}
.diff-boss{background:var(--purple-light);color:var(--purple)}
.loot-card .loot-effect{font-size:13px;color:var(--gold);font-style:italic;margin-top:6px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}
.loot-rarity{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;float:right}
.rarity-common{background:var(--bg);color:var(--ink3)}
.rarity-uncommon{background:var(--green-light);color:var(--green)}
.rarity-rare{background:var(--blue-light);color:var(--blue)}
.rarity-legendary{background:var(--gold-pale);color:var(--gold)}
.loot-scene-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;margin-top:8px;padding:4px 8px;background:var(--bg);border-radius:var(--r);color:var(--ink3)}

/* VILLAIN */
.villain-card-lib{background:var(--surface);border:2px solid var(--red);border-left:5px solid var(--red);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.villain-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--red);margin-bottom:4px}
.villain-status{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.vs-active{background:var(--red-light);color:var(--red)}
.vs-prepared{background:var(--gold-pale);color:var(--gold)}

/* DIFFICULTY METER */
.difficulty-meter{padding:12px 14px;border-radius:var(--r-lg);border:2px solid var(--border);background:var(--surface2);margin-top:12px}
.difficulty-meter .dm-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ink3);margin-bottom:8px}
.dm-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.dm-fill{height:100%;border-radius:4px}
.dm-fill.medium{background:var(--orange);width:55%}
.dm-text{font-size:12px;display:flex;justify-content:space-between}

/* ══════════════════════════════════════════════
   LIBRARY
   ══════════════════════════════════════════════ */
.lib-category-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lib-cat-tab{
  padding:10px 18px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;gap:6px;
}
.lib-cat-tab:active{background:var(--bg)}
.lib-cat-tab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.lib-cat-tab .tab-count{font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;color:var(--ink4);font-weight:700}
.lib-cat-tab.active .tab-count{background:rgba(138,111,10,.12);color:var(--gold)}
.lib-content{display:none}
.lib-content.active{display:block}
.library-layout{display:flex;gap:16px;height:calc(100vh - 220px)}
@media(max-width:900px){
  .library-layout{flex-direction:column;height:auto}
  .library-list{width:100% !important;min-width:0 !important;max-height:300px}
}
.library-list{
  width:300px;min-width:300px;background:var(--surface);
  border:2px solid var(--border);border-radius:var(--r-lg);overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.library-list::-webkit-scrollbar{display:none}
.library-search{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.library-search input{
  width:100%;padding:10px 12px;border:2px solid var(--border);
  border-radius:var(--r);font-size:14px;font-family:var(--font);
}
.library-search input:focus{outline:none;border-color:var(--gold)}
.library-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px}
.library-item:active{background:var(--bg)}
.library-item.active{background:var(--gold-pale);border-left:4px solid var(--gold)}
.library-item .li-name{font-size:14px;font-weight:600}
.library-item .li-role{font-size:12px;color:var(--ink3);margin-top:2px}
.library-item .li-status{float:right}
.library-detail{
  flex:1;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.library-detail::-webkit-scrollbar{display:none}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink4);font-size:15px}
.detail-header{margin-bottom:20px}
.detail-name{font-size:22px;font-weight:700;font-family:var(--serif);color:var(--ink)}
.detail-role{font-size:14px;color:var(--ink3);margin-top:3px}
.detail-section{margin-bottom:16px}
.detail-section-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:6px}
.detail-section-value{font-size:14px;color:var(--ink);line-height:1.6}
.detail-voice{
  font-size:15px;color:var(--gold);font-style:italic;
  padding:14px 18px;background:var(--gold-pale);border-radius:var(--r);
  border-left:4px solid var(--gold);margin-top:10px;font-family:var(--serif);
}
.creature-terrain{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green);margin-right:12px}

/* ══════════════════════════════════════════════
   PLAYER CARDS
   ══════════════════════════════════════════════ */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.player-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px 20px}
.player-card-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.player-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.player-card-name{font-size:18px;font-weight:700;font-family:var(--serif)}
.player-card-class{font-size:13px;color:var(--ink3)}
.player-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.player-tag{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.player-tag.faction{background:var(--gold-pale);color:var(--gold);border-color:var(--gold)}
.player-objective{padding:10px 12px;border-radius:var(--r);background:var(--purple-light);border:1px dashed var(--purple);font-size:13px;color:var(--purple);line-height:1.5;margin-top:10px}
.player-objective-label{font-weight:700;font-size:10px;letter-spacing:.5px;margin-bottom:4px}
.echo-tracker{display:flex;align-items:center;gap:10px;margin-top:12px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}
.echo-tracker-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.echo-dots{display:flex;gap:6px}
.echo-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px}
.echo-dot.filled{background:var(--gold);color:#fff}

/* ══════════════════════════════════════════════
   PLACEHOLDER
   ══════════════════════════════════════════════ */
.placeholder-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center}
.placeholder-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.placeholder-title{font-size:18px;font-weight:700;color:var(--ink3);margin-bottom:8px}
.placeholder-desc{font-size:14px;color:var(--ink4);max-width:400px;line-height:1.6}

/* ══════════════════════════════════════════════
   COMBAT TRACKER
   ══════════════════════════════════════════════ */
.tracker-bar{display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);margin-bottom:16px;flex-wrap:wrap}
.tracker-stat{text-align:center;min-width:60px}
.tracker-stat-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--ink3)}
.tracker-stat-value{font-size:22px;font-weight:800;color:var(--ink)}
.tracker-stat-value.gold{color:var(--gold)}

.initiative-bar{display:flex;gap:6px;overflow-x:auto;padding:10px 0;-webkit-overflow-scrolling:touch}
.initiative-bar::-webkit-scrollbar{display:none}
.init-chip{
  flex-shrink:0;padding:8px 14px;border-radius:var(--r);
  font-size:13px;font-weight:600;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;min-height:44px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.init-chip.active{border-color:var(--green);background:var(--green-light);color:var(--green)}
.init-chip.done{opacity:.4;text-decoration:line-through}
.init-chip.dead{opacity:.25;text-decoration:line-through}
.init-chip.player{border-color:var(--blue);color:var(--blue)}
.init-chip.player.active{border-color:var(--blue);background:var(--blue-light)}
.init-chip.sinergia-eligible{border-style:dashed;border-color:var(--gold)}

.unit-card-tracker{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:16px;margin-bottom:10px;
}
.unit-card-tracker.active-unit{border-color:var(--green);background:#f4faf6}
.unit-card-tracker.dead-unit{opacity:.35}
.unit-header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.unit-name{font-size:17px;font-weight:700;font-family:var(--serif)}
.unit-meta{font-size:12px;color:var(--ink3)}
.hp-section{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.hp-display{font-size:20px;font-weight:800;min-width:80px}
.hp-bar{flex:1;min-width:120px;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.hp-fill{height:100%;border-radius:5px;transition:width .2s}
.hp-controls{display:flex;gap:6px;align-items:center}
.hp-controls input{width:70px;padding:8px 10px;border:2px solid var(--border);border-radius:var(--r);font-size:15px;text-align:center;font-family:var(--font)}
.hp-controls input:focus{outline:none;border-color:var(--gold)}
.btn-damage{background:var(--red-light);border-color:var(--red);color:var(--red);min-height:44px}
.btn-heal{background:var(--green-light);border-color:var(--green);color:var(--green);min-height:44px}
.actions-row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;align-items:center}
.action-check{display:flex;align-items:center;gap:8px;font-size:14px;min-height:44px;cursor:pointer}
.action-check input[type="checkbox"]{width:22px;height:22px}
.conditions-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.condition-tag{padding:4px 10px;border-radius:var(--r);font-size:11px;font-weight:600;background:var(--red-light);color:var(--red)}
.abilities-compact{margin-top:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.ability-line{font-size:13px;color:var(--ink2);padding:4px 0;border-bottom:1px solid var(--border)}
.ability-line:last-child{border:none}
.ability-name{font-weight:700;color:var(--ink)}

.lair-panel{background:var(--orange-light);border:2px dashed var(--orange);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.lair-panel .form-label{color:var(--orange)}
.lair-action-btn{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--surface);border:2px solid var(--border);border-radius:var(--r);
  font-size:14px;cursor:pointer;min-height:44px;width:100%;margin-bottom:6px;
  color:var(--ink2);
}
.lair-action-btn:active{background:var(--orange-light);border-color:var(--orange)}
.lair-action-btn.used{opacity:.35;text-decoration:line-through}

.echo-panel{background:var(--gold-pale);border:2px solid var(--gold);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.echo-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(138,111,10,.15);min-height:44px}
.echo-row:last-child{border:none}
.echo-player-name{font-size:15px;font-weight:600}
.echo-btn{
  padding:8px 14px;border-radius:var(--r);font-size:14px;font-weight:700;
  background:var(--gold);color:#fff;border:none;cursor:pointer;min-height:44px;
}
.echo-btn:active{background:#6a5808}
.echo-count{font-size:18px;font-weight:800;color:var(--gold);min-width:30px;text-align:center}

.no-session{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;text-align:center;gap:16px}
.no-session-title{font-size:18px;font-weight:700;color:var(--ink3)}
.no-session-desc{font-size:14px;color:var(--ink4);max-width:400px;line-height:1.6}

/* ══════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════ */
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mb-16{margin-bottom:16px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px}
.modal::-webkit-scrollbar{display:none}
.modal-title{font-size:18px;font-weight:700;font-family:var(--serif);margin-bottom:16px;color:var(--ink)}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink4)}
.empty-state-title{font-size:16px;font-weight:600;color:var(--ink3);margin-bottom:8px}
.empty-state-desc{font-size:14px;margin-bottom:16px;line-height:1.5}
.entity-list-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:space-between}
.entity-list-item:active{background:var(--bg)}
.entity-list-item.selected{background:var(--gold-pale);border-left:4px solid var(--gold)}
.delete-btn{color:var(--red);background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.inline-edit{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;width:100%;font-family:var(--font);color:var(--ink)}
.inline-edit:focus{outline:none;border-color:var(--gold)}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.move-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px}
.move-item input[type=checkbox]{width:20px;height:20px}
.move-done{text-decoration:line-through;color:var(--ink4)}

/* AVATAR IMAGES */
.avatar-img{width:40px;height:40px;border-radius:50%;background-size:cover;background-position:center;flex-shrink:0;border:2px solid var(--border)}
/* BEAT ACCORDION */
.beats-accordion{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.beat-block{border:2px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
.beat-block.open{border-color:var(--gold)}
.beat-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;min-height:44px}
.beat-head:active{background:var(--bg)}
.beat-block.open .beat-head{background:var(--gold-pale)}
.beat-num{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.beat-name{font-size:15px;font-weight:600;font-family:var(--serif)}
.beat-count{font-size:12px;color:var(--ink3)}
.beat-arrow{font-size:12px;color:var(--ink4)}
.beat-body{padding:14px 16px;border-top:1px solid var(--border)}

/* SCENE WIZARD */
.wizard-steps{display:flex;gap:8px;margin-bottom:16px}
.wizard-step{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:600;border-radius:var(--r);background:var(--surface2);color:var(--ink4);border:2px solid var(--border)}
.wizard-step.active{background:var(--gold-pale);color:var(--gold);border-color:var(--gold)}
.wizard-step.done{background:var(--green);color:#fff;border-color:var(--green)}
.selected-participant{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.qty-stepper{display:flex;align-items:center;gap:8px}
.qty-stepper button{width:32px;height:32px;border-radius:var(--r);border:2px solid var(--border);background:var(--surface);font-size:18px;font-weight:700;cursor:pointer;color:var(--ink)}
.qty-stepper button:active{background:var(--gold-pale)}
.qty-stepper span{min-width:24px;text-align:center;font-weight:700}
.wiz-picker{max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);margin-top:8px}
.wiz-picker::-webkit-scrollbar{width:6px}
.wiz-picker::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.wiz-picker-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px}
.wiz-picker-item:active{background:var(--gold-pale)}
.wiz-picker-item:last-child{border-bottom:none}
.wiz-check{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;cursor:pointer}
.wiz-check input{width:20px;height:20px}
.base-lock{font-size:12px;opacity:.6}
.custom-lair-tag{display:inline-block;background:var(--gold-pale);color:var(--gold);padding:4px 10px;border-radius:var(--r);font-size:13px;margin:4px 4px 0 0}
.difficulty-meter{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:16px}
.diff-meter-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-top:8px}
.diff-meter-fill{height:100%;border-radius:5px;transition:width .3s}

/* PLAYER PREVIEW */
.player-preview-card{margin-top:16px;padding:16px;background:var(--surface2);border:2px solid var(--border);border-radius:var(--r-lg)}
/* HERO CHECKBOXES IN WIZARD */
.hero-check{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border:2px solid var(--border);border-radius:var(--r);margin-bottom:6px;cursor:pointer;min-height:44px}
.hero-check:active{background:var(--bg)}
.hero-check.checked{border-color:var(--gold);background:var(--gold-pale)}
.hero-check-box{width:28px;height:28px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold)}
.hero-check.checked .hero-check-box{border-color:var(--gold);background:var(--gold)}
.hero-check.checked .hero-check-box{color:#fff}
/* BASE TAGS */
.base-tag{font-size:11px;color:var(--ink4);background:var(--surface2);padding:3px 8px;border-radius:var(--r);border:1px solid var(--border)}

/* PREVIEW GROUP LABELS */
.preview-group-label{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin:12px 0 4px 0;padding-top:8px;border-top:1px solid var(--border)}
.faction-feat-block{background:var(--gold-pale);border-radius:var(--r);padding:12px;border:1px solid var(--gold)}
/* BESTIARY FILTERS */
.filter-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);position:relative}
.filter-group{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.filter-cat-label{font-size:12px;font-weight:600;color:var(--ink3);margin-right:4px;min-width:70px}
.filter-chip{font-size:12px;padding:5px 12px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink2);min-height:32px;display:inline-flex;align-items:center}
.filter-chip:active{transform:scale(.96)}
.filter-chip.active{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:600}
.filter-clear{font-size:12px;color:var(--red);cursor:pointer;align-self:flex-end;font-weight:600}

/* INITIATIVE REORDER ARROWS */
.init-chip-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.init-arrows{display:flex;gap:2px}
.init-arrow{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--ink2);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.init-arrow:active{background:var(--gold-pale)}
.init-arrow:disabled{opacity:.25;cursor:default}
/* VILLAIN EDITORS */
.edit-ability-row{display:flex;gap:8px;align-items:flex-start;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}

/* COMPACT FILTER DROPDOWNS */
.filter-bar-dd{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.filter-dd{font-size:13px;padding:8px 10px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);color:var(--ink);min-height:40px;cursor:pointer;font-family:var(--font)}
.filter-dd:focus{outline:none;border-color:var(--gold)}
.filter-clear{font-size:13px;color:var(--red);cursor:pointer;font-weight:600;padding:8px 4px}
/* ROLE BADGES */
.role-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px;vertical-align:middle;color:#fff}
.role-minion{background:#7a7a7a}
.role-tank{background:#2858a0}
.role-caster{background:#7a3aa0}
.role-bruiser{background:#9b3030}
.role-controller{background:#1a7a6a}
.role-skirmisher{background:#b06a0a}

/* CAMPAIGN MODES */
.campaign-header{margin-bottom:16px}
.mode-toggle{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:var(--r);border:1px solid var(--border)}
.mode-btn{font-size:13px;padding:8px 14px;border-radius:6px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-weight:600;min-height:40px}
.mode-btn.active{background:var(--surface);color:var(--gold);box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* OBJECTIVES PANEL */
.objectives-panel{background:var(--surface);border:2px solid var(--gold);border-radius:var(--r-lg);padding:16px;margin-bottom:20px}
.obj-main{font-size:15px;color:var(--ink);margin-top:10px;line-height:1.5}
.obj-secondary{margin-top:10px}
.obj-secondary ul{margin:4px 0 0 0;padding-left:20px}
.obj-secondary li{font-size:14px;color:var(--ink2);margin-bottom:2px}
.obj-division{margin-top:10px;font-size:14px;color:var(--ink2);line-height:1.5}
.obj-label{display:inline-block;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-right:6px;vertical-align:middle}
/* ARCS BOARD */
.arcs-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch}
.arc-column{flex:0 0 280px;background:var(--surface2);border:2px solid var(--border);border-radius:var(--r-lg);padding:12px;display:flex;flex-direction:column}
.arc-column-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.arc-name{font-size:16px;font-weight:700;font-family:var(--serif);color:var(--ink)}
.arc-beat-count{font-size:12px;color:var(--ink3)}
.arc-controls{display:flex;gap:4px;align-items:center}
.arc-beats{display:flex;flex-direction:column;gap:8px}
.beat-tile{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;min-height:44px}
.beat-tile:active{background:var(--gold-pale);border-color:var(--gold)}
.beat-tile-name{font-size:14px;font-weight:600;color:var(--ink)}
.beat-tile-meta{font-size:12px;color:var(--ink3);margin-top:2px}
.add-beat-btn{margin-top:4px;width:100%;justify-content:center;font-size:13px}
.add-arc-btn{flex:0 0 auto;align-self:flex-start;height:fit-content}
.detail-nav{margin-bottom:16px}

/* MINI SCENES IN PLANNING MODE */
.beat-tile-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:8px}
.beat-tile-wrap:active{border-color:var(--gold)}
.beat-tile-clickable{cursor:pointer;min-height:36px}
.beat-tile-scenes{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.mini-scene{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--surface2);border-radius:6px;cursor:pointer;font-size:13px;min-height:36px}
.mini-scene:active{background:var(--gold-pale)}
.mini-scene-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-combat{background:var(--red)}
.dot-narr{background:#2858a0}
.mini-scene-name{flex:1;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-scene-played{color:var(--green);font-size:12px}
.mini-add-scene{margin-top:8px;width:100%;justify-content:center;font-size:12px;min-height:38px}

/* WRITER MODE */
.writer-wrap{max-width:760px;margin:0 auto}
.writer-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.writer-title-block{flex:1;display:flex;align-items:center;gap:10px;min-width:200px}
.writer-scene-name{font-size:22px;font-weight:700;font-family:var(--serif);color:var(--ink)}
.writer-saved{font-size:12px;color:var(--green);opacity:0;transition:opacity .3s}
.writer-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:24px;padding:12px;background:var(--surface2);border-radius:var(--r)}
.writer-nav-pos{font-size:14px;color:var(--ink3);font-weight:600}
.writer-section{margin-bottom:16px;border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
.writer-section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--gold);background:var(--surface2);min-height:44px}
.writer-section-head:active{background:var(--gold-pale)}
.writer-arrow{font-size:14px;color:var(--ink3)}
.writer-textarea{width:100%;border:none;background:transparent;padding:16px 18px;font-size:16px;line-height:1.7;color:var(--ink);font-family:var(--font);resize:vertical;min-height:90px;box-sizing:border-box}
.writer-textarea:focus{outline:none;background:var(--surface)}
.writer-textarea.writer-big{min-height:320px;font-size:17px;line-height:1.8}
.writer-sub-label{font-size:11px;font-weight:700;color:var(--ink3);padding:10px 18px 0;letter-spacing:.5px}
.writer-narrative{border-color:var(--gold)}

/* WIKI / LORE */
.wiki-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.wiki-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px;cursor:pointer;min-height:90px}
.wiki-card:active{border-color:var(--gold);background:var(--gold-pale)}
.wiki-card-title{font-size:16px;font-weight:700;font-family:var(--serif);color:var(--ink);margin-bottom:6px}
.wiki-card-preview{font-size:13px;color:var(--ink3);line-height:1.4}
.wiki-layout{display:flex;gap:16px;align-items:flex-start}
.wiki-sidebar{flex:0 0 220px;position:sticky;top:0}
.wiki-list-item{padding:10px 12px;border-radius:var(--r);cursor:pointer;font-size:14px;color:var(--ink2);min-height:40px;display:flex;align-items:center}
.wiki-list-item:active{background:var(--gold-pale)}
.wiki-list-item.active{background:var(--gold-pale);color:var(--gold);font-weight:600;border-left:3px solid var(--gold)}
.wiki-main{flex:1;min-width:0}
.wiki-page-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.wiki-title-input{flex:1;font-size:24px;font-weight:700;font-family:var(--serif);border:none;background:transparent;color:var(--ink);border-bottom:2px solid transparent;padding:4px 0}
.wiki-title-input:focus{outline:none;border-bottom-color:var(--gold)}
.wiki-editor{width:100%;min-height:400px;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px;font-size:16px;line-height:1.7;color:var(--ink);font-family:var(--font);resize:vertical;box-sizing:border-box;background:var(--surface)}
.wiki-editor:focus{outline:none;border-color:var(--gold)}
.wiki-hint{font-size:12px;color:var(--ink4);margin-top:8px}
.wiki-reading{font-size:16px;line-height:1.8;color:var(--ink)}
.wiki-p{margin:0 0 12px 0}
.wikilink{color:var(--gold);font-weight:600;cursor:pointer;border-bottom:1px solid var(--gold);padding:0 1px}
.wikilink:active{background:var(--gold-pale)}
.wikilink-new{color:var(--ink4);border-bottom:1px dotted var(--ink4)}
.wiki-backlinks{margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.wiki-backlink{padding:8px 12px;background:var(--surface2);border-radius:var(--r);margin-bottom:6px;cursor:pointer;font-size:14px;min-height:40px;display:flex;align-items:center}
.wiki-backlink:active{background:var(--gold-pale)}
.writer-links{margin-top:10px}
.writer-links-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}

/* SCENE NARRATIVE DISPLAY */
.scene-narrative-display{font-size:15px;line-height:1.7;color:var(--ink2);background:var(--surface2);padding:14px 16px;border-radius:var(--r);border:1px solid var(--border)}
.scene-narrative-display .wiki-p{margin:0 0 10px 0}

/* BEAT INFO */
.beat-info-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.beat-info-field{margin-top:10px;font-size:14px;color:var(--ink2);line-height:1.6}
.beat-info-label{display:block;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-bottom:2px}
/* COMBAT PREVIEW */
.preview-units{display:flex;flex-direction:column;gap:8px}
.preview-hero,.preview-enemy{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.preview-hero{border-left:3px solid var(--green)}
.preview-enemy{border-left:3px solid var(--red)}
.preview-villain{border-left:3px solid #8b1a1a;background:var(--gold-pale)}
.preview-unit-info{flex:1;min-width:0}
.preview-unit-name{font-size:14px;font-weight:600;color:var(--ink)}
.preview-unit-meta{font-size:12px;color:var(--ink3)}
.preview-unit-hp{font-size:13px;font-weight:700;color:var(--ink2);white-space:nowrap}

/* INITIATIVE SETUP */
.init-setup-wrap{max-width:680px;margin:0 auto}
.init-setup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.init-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.init-row.init-selected{border-color:var(--gold);background:var(--gold-pale)}
.init-row-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.init-row-name{font-size:14px;font-weight:600;color:var(--ink)}
.init-row-meta{font-size:12px;color:var(--ink3)}
.init-input{width:64px;padding:8px;border:1.5px solid var(--border);border-radius:var(--r);font-size:16px;text-align:center;font-weight:700;color:var(--ink);background:var(--surface)}
.init-input:focus{outline:none;border-color:var(--gold)}
.init-squad{background:var(--surface);border:2px solid var(--gold);border-radius:var(--r-lg);padding:12px;margin-bottom:8px}
.init-squad-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.squad-name-input{font-size:15px;font-weight:700;font-family:var(--serif);border:none;background:transparent;color:var(--ink);border-bottom:1px solid transparent;padding:2px 0;width:100%}
.squad-name-input:focus{outline:none;border-bottom-color:var(--gold)}
.init-squad-members{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.squad-member-chip{font-size:12px;background:var(--surface2);padding:3px 8px;border-radius:10px;color:var(--ink2);border:1px solid var(--border)}
.init-setup-actions{display:flex;gap:8px;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* SQUAD BLOCK IN TRACKER */
.squad-block{border:2px solid var(--gold);border-radius:var(--r-lg);padding:8px;margin-bottom:12px;background:var(--gold-pale)}
.squad-block.active-squad{box-shadow:0 0 0 2px var(--gold)}
.squad-block-head{font-size:13px;font-weight:700;font-family:var(--serif);color:var(--gold);padding:4px 8px 8px}
.squad-block .unit-card-tracker{margin-bottom:6px}
/* SYNERGY REMINDER */
.synergy-reminder{font-size:13px;color:var(--gold);margin-bottom:12px;padding:10px 14px;background:var(--gold-pale);border-radius:var(--r);border:1px solid var(--gold);line-height:1.5}

/* IN-COMBAT GROUPING */
.group-mode-banner{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:12px 14px;background:var(--gold-pale);border:2px solid var(--gold);border-radius:var(--r);margin-bottom:12px;font-size:13px;color:var(--ink2)}
.unit-card-tracker.group-selectable{cursor:pointer;border-style:dashed}
.unit-card-tracker.group-selectable:active{background:var(--gold-pale)}
.unit-card-tracker.group-selected{border-color:var(--gold);border-style:solid;background:var(--gold-pale);box-shadow:0 0 0 2px var(--gold)}

/* SQUAD COLLAPSE */
.squad-collapsed-preview{display:flex;flex-wrap:wrap;gap:6px;padding:4px 8px 8px}
.squad-mini{font-size:12px;background:var(--surface2);padding:4px 10px;border-radius:10px;color:var(--ink2);border:1px solid var(--border)}
.squad-mini.dead{opacity:.5;text-decoration:line-through}
/* GRAVEYARD */
.graveyard{margin-top:20px;padding:14px;background:var(--surface2);border:1px dashed var(--ink4);border-radius:var(--r-lg)}
.graveyard-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.graveyard-unit{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;background:var(--surface);border-radius:var(--r);opacity:.75}
.graveyard-name{font-size:14px;color:var(--ink3)}

/* d12 ABILITY SYSTEM */
.d12-ability{margin-top:8px}
.d12-roll-btn{font-size:13px;padding:8px 16px;background:var(--gold);color:#fff;border:none;font-weight:700;min-height:40px}
.d12-roll-btn:active{transform:scale(.97)}
.d12-result{margin-top:8px;padding:12px;border-radius:var(--r);border:2px solid var(--border);text-align:center}
.d12-result.d12-b1{border-color:var(--ink4);background:var(--surface2)}
.d12-result.d12-b2{border-color:#2858a0;background:rgba(40,88,160,.08)}
.d12-result.d12-b3{border-color:var(--green);background:rgba(40,140,70,.08)}
.d12-result.d12-b12{border-color:var(--gold);background:var(--gold-pale);box-shadow:0 0 0 1px var(--gold)}
.d12-roll-num{font-size:28px;font-weight:800;font-family:var(--serif);color:var(--ink)}
.d12-band-label{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:2px 0}
.d12-label-b1{color:var(--ink3)}
.d12-label-b2{color:#2858a0}
.d12-label-b3{color:var(--green)}
.d12-label-b12{color:var(--gold)}
.d12-band-text{font-size:14px;color:var(--ink2);line-height:1.5;margin-top:4px}
.d12-echo{margin-top:8px;font-size:12px;padding:6px 10px;border-radius:6px;font-weight:600}
.d12-echo.echo-pass{background:rgba(40,140,70,.12);color:var(--green)}
.d12-echo.echo-slip{background:rgba(176,106,10,.12);color:var(--orange)}
/* STATIC BAND LIST (previews) */
.band-static{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.band-static-row{font-size:11px;color:var(--ink3);line-height:1.4;padding-left:4px}
.band-tag{display:inline-block;min-width:30px;font-weight:700;font-size:10px;padding:1px 5px;border-radius:8px;margin-right:4px;text-align:center;color:#fff}
.band-b1 .band-tag{background:var(--ink4)}
.band-b2 .band-tag{background:#2858a0}
.band-b3 .band-tag{background:var(--green)}
.band-b12 .band-tag{background:var(--gold)}
.band-b12{color:var(--ink2);font-weight:600}
.echo-flag{color:var(--gold);font-size:10px;font-weight:700}

/* MULTI-SELECT FILTER CHIPS */
.filter-bar-multi{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.filter-chip-group{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.filter-chip-group .filter-cat-label{font-size:12px;font-weight:700;color:var(--ink3);min-width:72px;padding-top:6px}
.filter-chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.fchip{font-size:12px;padding:5px 11px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink2);min-height:30px;display:inline-flex;align-items:center}
.fchip:active{transform:scale(.96)}
.fchip.on{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:600}
.active-tags{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding-top:8px;border-top:1px dashed var(--border)}
.active-tags-label{font-size:11px;font-weight:700;color:var(--ink4)}
.active-tag{font-size:12px;padding:4px 10px;border-radius:12px;background:var(--gold-pale);color:var(--gold);border:1px solid var(--gold);cursor:pointer;font-weight:600}
.active-tag:active{opacity:.7}
.clear-all-tags{font-size:12px;color:var(--red);cursor:pointer;font-weight:600;margin-left:4px}
.sort-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:10px}
.sort-label{font-size:12px;font-weight:700;color:var(--ink3)}
.sort-opt{font-size:12px;padding:5px 11px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink2);min-height:30px;display:inline-flex;align-items:center}
.sort-opt.on{background:var(--ink);color:var(--surface);border-color:var(--ink);font-weight:600}
.bestiary-count{font-size:12px;color:var(--ink3);margin-bottom:8px;font-weight:600}

/* PLAYER EXPANDED ABILITIES */
.player-abilities-expanded{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
/* ARC INFO PANEL */
.arc-info-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px}
.arc-info-block .beat-info-field:first-child{margin-top:0}

/* WIKI LINKING — picker + connections */
.wiki-editor-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.wiki-toolbar-hint{font-size:12px;color:var(--ink4)}
.modal-lg{max-width:520px;width:92%}
.link-picker-results{max-height:50vh;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface)}
.link-picker-group{font-size:11px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px 4px;background:var(--surface2)}
.link-picker-item{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;color:var(--ink2);min-height:44px}
.link-picker-item:active{background:var(--gold-pale)}
.link-picker-item.link-create{color:var(--gold);font-weight:600}
.link-picker-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.wiki-connections{margin-top:18px;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg)}
.wiki-conn-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wiki-conn-list{display:flex;flex-direction:column;gap:6px}
.wiki-conn-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--ink2)}
.wiki-conn-remove{color:var(--ink4);cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0}
.wiki-conn-remove:active{color:var(--red)}
.wiki-conn-empty{font-size:13px;color:var(--ink4);line-height:1.5}

/* LOOT & WEAPONS */
.rarity-badge{display:inline-block;padding:3px 10px;border-radius:10px;color:#fff;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rarity-dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;margin-left:2px}
.weapon-flavor{font-style:italic;color:var(--ink3);font-size:14px;margin:10px 0;padding-left:12px;border-left:3px solid var(--gold);line-height:1.5}

/* WEAPON DRAWBACK */
.weapon-drawback .detail-section-label{color:var(--red)}
.weapon-drawback .detail-section-value{color:var(--ink2);background:rgba(176,40,40,.06);padding:8px 12px;border-radius:var(--r);border-left:3px solid var(--red)}
.weapon-echo-note{font-size:12px;color:var(--gold);margin-top:8px;padding:6px 10px;background:var(--gold-pale);border-radius:6px}

/* WEAPON ASSIGNMENT */
.weapon-picker-list{max-height:50vh;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface)}
.weapon-picker-item{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer;border-bottom:1px solid var(--border);min-height:48px}
.weapon-picker-item:active{background:var(--gold-pale)}
.weapon-picker-item.owned{background:var(--gold-pale)}
.weapon-pick-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.weapon-picker-item.owned .weapon-pick-check{background:var(--gold);color:#fff}
.affinity-star{font-size:11px;color:var(--gold);font-weight:700}
.player-weapon{background:var(--gold-pale);border:1px solid var(--gold);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.player-weapon-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.player-weapon-name{font-weight:700;color:var(--ink);flex:1}
.player-weapon-cost{font-size:12px;color:var(--gold);font-weight:600}
.weapon-unequip{color:var(--ink4);cursor:pointer;font-size:18px;padding:0 4px}
.weapon-unequip:active{color:var(--red)}
.player-weapon-drawback{font-size:12px;color:var(--ink2);margin-top:6px;padding:6px 10px;background:rgba(176,40,40,.06);border-left:3px solid var(--red);border-radius:4px}
.weapon-owners{font-size:13px;color:var(--ink3);margin-top:10px;padding:8px 12px;background:var(--surface2);border-radius:var(--r)}

/* WIKI TYPES + MARKDOWN */
.wiki-type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin:10px 0}
.wiki-type-card{border:2px solid var(--border);border-radius:var(--r);padding:14px 8px;text-align:center;cursor:pointer;background:var(--surface);min-height:48px}
.wiki-type-card:active{background:var(--gold-pale)}
.wiki-type-icon{font-size:26px;margin-bottom:6px}
.wiki-type-label{font-size:13px;font-weight:600;color:var(--ink2)}
.wiki-type-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.wiki-type-select{border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:13px;padding:6px 8px;min-height:40px;margin-left:8px}
.wiki-card-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.wiki-count{font-size:13px;color:var(--ink4);margin:4px 0 10px}
.wiki-h3{font-size:19px;font-weight:700;color:var(--ink);margin:20px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--gold-pale)}
.wiki-h4{font-size:16px;font-weight:700;color:var(--ink2);margin:16px 0 6px}
.wiki-ul{margin:8px 0 12px 4px;padding-left:20px}
.wiki-ul li{font-size:15px;line-height:1.7;color:var(--ink2);margin-bottom:4px}
.wiki-hr{border:none;border-top:2px solid var(--border);margin:18px 0}

/* WIKI BASE + INDEX */
.wiki-title-static{font-size:26px;font-weight:700;color:var(--ink);flex:1}
.wiki-type-badge{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;align-self:center}
.wiki-index{max-width:760px}
.wiki-index-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.wiki-index-title{font-size:20px;font-weight:700;color:var(--ink);flex:1}
.wiki-index-group{margin-bottom:18px}
.wiki-index-group-title{font-size:15px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--border)}
.wiki-index-count{font-size:12px;color:var(--ink4);font-weight:400}
.wiki-index-item{padding:10px 12px;min-height:44px;display:flex;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;font-size:15px;color:var(--ink2)}
.wiki-index-item:active{background:var(--gold-pale)}

/* FACTION LORE IN PLAYER CARD */
.faction-lore-block{border:1px solid var(--border);border-left-width:3px;border-radius:var(--r);margin:10px 0;overflow:hidden}
.faction-lore-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;min-height:48px}
.faction-lore-title{font-weight:700;font-size:15px}
.faction-lore-toggle{color:var(--ink4);font-size:12px}
.faction-lore-body{padding:4px 14px 14px}
.faction-lore-decl{font-style:italic;color:var(--ink3);font-size:14px;line-height:1.5;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:10px}
.faction-lore-content{max-height:340px;overflow-y:auto;font-size:14px}
.faction-lore-content .wiki-h3{font-size:16px;margin:12px 0 6px}
.faction-lore-content .wiki-h4{font-size:14px}
.faction-lore-content .wiki-p,.faction-lore-content .wiki-ul li{font-size:14px;line-height:1.6}
.faction-lore-link{margin-top:12px;width:100%;justify-content:center}

/* COLLAPSIBLE ABILITY GROUPS */
.pgroup{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.pgroup-head{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer;min-height:44px;background:var(--surface2)}
.pgroup-head:active{background:var(--gold-pale)}
.pgroup-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2)}
.pgroup-count{display:inline-block;background:var(--ink4);color:#fff;font-size:11px;border-radius:9px;padding:1px 7px;margin-left:4px}
.pgroup-arrow{color:var(--ink4);font-size:11px}
.pgroup-body{padding:10px 13px}
.pgroup-empty{font-size:13px;color:var(--ink4);padding:4px 0}
/* JOURNAL */
.view-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}
.view-sub{font-size:13px;color:var(--ink4);margin-top:4px}
.journal-editor{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:18px}
.journal-editor-title{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--ink)}
.jl-label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink3);margin:12px 0 4px}
.journal-textarea{min-height:90px;resize:vertical;font-family:inherit;line-height:1.5}
.jl-players{display:flex;flex-wrap:wrap;gap:6px}
.jl-player-chip{padding:7px 12px;border:1px solid var(--border);border-radius:16px;font-size:13px;cursor:pointer;background:var(--surface);min-height:36px;display:inline-flex;align-items:center}
.jl-player-chip.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.jl-empty-note{font-size:13px;color:var(--ink4)}
.journal-editor-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.journal-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.journal-entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.journal-session{font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.journal-entry-actions{display:flex;gap:10px}
.jl-edit,.jl-del{cursor:pointer;font-size:15px}
.journal-entry-body{font-size:14px;line-height:1.6;color:var(--ink2)}
.journal-entry-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.journal-tag{font-size:12px;padding:4px 10px;border-radius:12px;background:var(--surface2);border:1px solid var(--border)}
.journal-tag.scene{cursor:pointer;color:var(--ink2)}
.journal-tag.scene:active{background:var(--gold-pale)}
.journal-tag.player{color:var(--ink3)}
.player-journal-entry{border-left:3px solid var(--gold);padding:6px 0 6px 10px;margin-bottom:10px}

<script>
/* DB LAYER */
var DB_PREFIX='eqsm_';
var DB_TABLES=['campaign','sessions','scenes','npcs','villains','bestiary','loot','players','wiki'];
function dbKey(t){return DB_PREFIX+t}
function dbLoad(t){try{var d=localStorage.getItem(dbKey(t));return d?JSON.parse(d):null}catch(e){return null}}
function dbSave(t,d){try{localStorage.setItem(dbKey(t),JSON.stringify(d));return true}catch(e){alert('Error guardando (¿localStorage lleno?): '+e.message);return false}}
function dbGetAll(t){return dbLoad(t)||[]}
function dbGetById(t,id){return dbGetAll(t).find(function(i){return i.id===id})||null}
function dbCreate(t,item){var items=dbGetAll(t);if(!item.id)item.id=t.substring(0,3)+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);items.push(item);dbSave(t,items);return item}
function dbUpdate(t,id,up){var items=dbGetAll(t);var idx=items.findIndex(function(i){return i.id===id});if(idx===-1)return;Object.keys(up).forEach(function(k){items[idx][k]=up[k]});dbSave(t,items);return items[idx]}
function dbDelete(t,id){dbSave(t,dbGetAll(t).filter(function(i){return i.id!==id}))}
function cleanupSceneRefs(sceneId){
  // Quitar la escena de beat.scenes[], de activeSceneId y del journal
  var camp=dbLoad('campaign');
  if(camp){
    var changed=false;
    (camp.arcs||[]).forEach(function(arc){(arc.beats||[]).forEach(function(b){
      var i=(b.scenes||[]).indexOf(sceneId);
      if(i>-1){b.scenes.splice(i,1);changed=true}
    })});
    if(camp.activeSceneId===sceneId){camp.activeSceneId=null;changed=true}
    if(changed)dbSave('campaign',camp);
  }
  var sessions=dbGetAll('sessions');var sChanged=false;
  sessions.forEach(function(e){if(e.sceneId===sceneId){e.sceneId='';sChanged=true}});
  if(sChanged)dbSave('sessions',sessions);
}
function cleanupBeatRefs(beatIds){
  // Quitar beats borrados de los beatIds del journal
  if(!beatIds||!beatIds.length)return;
  var sessions=dbGetAll('sessions');var changed=false;
  sessions.forEach(function(e){
    if(!e.beatIds||!e.beatIds.length)return;
    var before=e.beatIds.length;
    e.beatIds=e.beatIds.filter(function(bid){return beatIds.indexOf(bid)===-1});
    if(e.beatIds.length!==before)changed=true;
  });
  if(changed)dbSave('sessions',sessions);
}
function seedIfEmpty(){if(dbLoad('_init'))return;DB_TABLES.forEach(function(t){if(!dbLoad(t))dbSave(t,t==='campaign'?null:[])});dbSave('_init',true)}
seedIfEmpty();

/* HELPERS */
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,4)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getPlayerWeapons(p){return (p&&p.weapons?p.weapons:[]).map(function(wid){return getLootById(wid)}).filter(Boolean)}
function openAssignWeaponTo(weaponId){
  var w=getLootById(weaponId);if(!w)return;
  var players=dbGetAll('players');
  var villains=dbGetAll('villains');
  var h='<div class="modal-overlay"><div class="modal modal-lg"><div class="modal-title">Asignar '+esc(w.name)+' a...</div>';
  if(!players.length&&!villains.length){
    h+='<div style="padding:12px;color:var(--ink4);font-size:14px">No hay personajes ni villanos. Crea uno primero.</div>';
  }
  if(players.length){
    h+='<div class="link-picker-group">Personajes</div>';
    players.forEach(function(p){var has=(p.weapons||[]).indexOf(weaponId)>-1;h+='<div class="weapon-picker-item'+(has?' owned':'')+'" data-action="toggle-weapon" data-ttype="player" data-tid="'+p.id+'" data-wid="'+weaponId+'"><div style="flex:1">'+esc(p.name)+'</div><div class="weapon-pick-check">'+(has?'✓':'+')+'</div></div>'});
  }
  if(villains.length){
    h+='<div class="link-picker-group">Villanos</div>';
    villains.forEach(function(v){var has=(v.weapons||[]).indexOf(weaponId)>-1;h+='<div class="weapon-picker-item'+(has?' owned':'')+'" data-action="toggle-weapon" data-ttype="villain" data-tid="'+v.id+'" data-wid="'+weaponId+'"><div style="flex:1">'+esc(v.name)+'</div><div class="weapon-pick-check">'+(has?'✓':'+')+'</div></div>'});
  }
  h+='<div class="modal-actions"><button class="btn btn-primary" data-action="close-modal">Listo</button></div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
}
function openWeaponPicker(targetType,targetId){
  weaponPickerTarget={type:targetType,id:targetId};
  var weapons=(G&&G.weapons?G.weapons:[]);
  var entity=targetType==='player'?dbGetById('players',targetId):dbGetById('villains',targetId);

var journalFilters={session:'',playerId:'',sceneId:'',arcId:'',beatId:''};
function journalMigrate(){
  // Non-destructive: derive sessionNum/sessionTitle from old free-text 'session' if missing
  dbGetAll('sessions').forEach(function(e){
    if(e.sessionNum===undefined||e.sessionNum===null){
      var num='';var title=e.sessionTitle||'';
      if(e.session){
        var m=(''+e.session).match(/\d+/);
        if(m)num=parseInt(m[0],10);
        // if the old text had more than just "Sesión N", keep remainder as title
        var rem=(''+e.session).replace(/sesi[oó]n\s*/i,'').replace(/^\s*\d+\s*[:.-]?\s*/,'').trim();
        if(rem&&!title)title=rem;
      }
      dbUpdate('sessions',e.id,{sessionNum:(num===''?null:num),sessionTitle:title});
    }
  });
}
function journalSessionLabel(num,title){
  var base=(num===null||num===''||num===undefined)?'Sin número':('Sesión '+num);
  return title?(base+': '+title):base;
}
function journalGrouped(entries){
  // group by sessionNum; numeric sort asc; 'Sin número' last
  var groups={};
  entries.forEach(function(e){var k=(e.sessionNum===null||e.sessionNum===undefined||e.sessionNum==='')?'__none__':e.sessionNum;(groups[k]=groups[k]||[]).push(e)});
  var keys=Object.keys(groups);
  keys.sort(function(a,b){
    if(a==='__none__')return 1;if(b==='__none__')return -1;
    return (+a)-(+b);
  });
  // within a session: creation order (oldest first)
  keys.forEach(function(k){groups[k].sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0)})});
  return keys.map(function(k){return {key:k,num:(k==='__none__'?null:+k),entries:groups[k]}});
}
function journalApplyFilters(entries){
  return entries.filter(function(e){
    if(journalFilters.session!==''){var k=(e.sessionNum===null||e.sessionNum===undefined||e.sessionNum==='')?'__none__':String(e.sessionNum);if(k!==journalFilters.session)return false}
    if(journalFilters.playerId&&(e.playerIds||[]).indexOf(journalFilters.playerId)===-1)return false;
    if(journalFilters.sceneId&&e.sceneId!==journalFilters.sceneId)return false;
    if(journalFilters.beatId&&(e.beatIds||[]).indexOf(journalFilters.beatId)===-1)return false;
    if(journalFilters.arcId){
      // La entrada pasa si alguno de sus beats pertenece al arco filtrado
      var camp=dbLoad('campaign');var arcBeatIds=[];
      if(camp){(camp.arcs||[]).forEach(function(arc){if((arc.id||'')===journalFilters.arcId){arcBeatIds=(arc.beats||[]).map(function(b){return b.id})}})}
      var hit=(e.beatIds||[]).some(function(bid){return arcBeatIds.indexOf(bid)>-1});
      if(!hit)return false;
    }
    return true;
  });
}

function getActiveSceneId(){var camp=dbLoad('campaign');return camp?camp.activeSceneId||null:null}
function setActiveScene(sceneId){
  var camp=dbLoad('campaign');if(!camp)return;
  camp.activeSceneId=sceneId||null;
  dbSave('campaign',camp);
  // al activar una escena, si estaba sin-jugar la marcamos activa
  if(sceneId){var sc=dbGetById('scenes',sceneId);if(sc&&(!sc.playState||sc.playState==='unplayed')){dbUpdate('scenes',sceneId,{playState:'active'})}}
  renderCampaign();
}
function scenePlayState(sc){
  // 'active' si es la escena activa; si no, su playState guardado ('played' o 'unplayed')
  if(!sc)return 'unplayed';
  var activeId=getActiveSceneId();
  if(sc.id===activeId)return 'active';
  if(sc.playState==='played')return 'played';
  return 'unplayed';
}
function cyclePlayState(sceneId){
  // Ciclo: sin-jugar → activa → jugada → sin-jugar
  var sc=dbGetById('scenes',sceneId);if(!sc)return;
  var state=scenePlayState(sc);
  if(state==='unplayed'){setActiveScene(sceneId)}
  else if(state==='active'){
    // pasa a jugada y deja de ser activa
    dbUpdate('scenes',sceneId,{playState:'played'});
    var camp=dbLoad('campaign');if(camp){camp.activeSceneId=null;dbSave('campaign',camp)}
    renderCampaign();
  }
  else{ // jugada → sin-jugar
    dbUpdate('scenes',sceneId,{playState:'unplayed'});
    renderCampaign();
  }
}
function playStateMeta(state){
  if(state==='active')return{icon:'▶',label:'activa ahora',cls:'gs-active'};
  if(state==='played')return{icon:'✓',label:'jugada',cls:'gs-played'};
  return{icon:'○',label:'sin jugar',cls:'gs-unplayed'};
}

function gameLastSessionNum(){

  if(!nums.length)return '';

}

function sortCreatures(creatures,sort){

}

/* ══════ d12 ABILITY SYSTEM ══════ */
var abilityRolls={}; // transient: key = unitId+'::'+abilityName, value = roll result object
function d12Band(roll){if(roll<=4)return'b1';if(roll<=8)return'b2';if(roll<=11)return'b3';return'b12'}
function bandLabel(b){return{b1:'Weak',b2:'Medium',b3:'Strong',b12:'MAX'}[b]||b}
function resolveAbilityRoll(ability,roll,echo){
  var band=d12Band(roll);var echoCheck=null;
  if(band==='b12'&&ability.echoDC){
    var d20=1+Math.floor(Math.random()*20);
    var total=d20+(echo||0);
    echoCheck={d20:d20,echo:echo||0,total:total,dc:15,passed:total>=15};
    if(!echoCheck.passed)band='b3';
  }
  return{roll:roll,band:band,text:ability.bandas?ability.bandas[band]:'',echoCheck:echoCheck};
}
function rollAbility(unitId,abilityName){
  var u=combat.units.find(function(x){return x.id===unitId});if(!u)return;
  var ability=(u.abilities||[]).find(function(a){return a.name===abilityName});if(!ability||!ability.tabla)return;
  // Get player's echo
  var echo=0;
  if(u.type==='player'){var baseId=unitId.split('-')[0];var pl=dbGetById('players',baseId);if(!pl){var pls=dbGetAll('players');pl=pls.find(function(p){return u.name.indexOf(p.name)>-1})}if(pl)echo=pl.echo||0}
  var roll=1+Math.floor(Math.random()*12);
  abilityRolls[unitId+'::'+abilityName]=resolveAbilityRoll(ability,roll,echo);
  renderSession();
}
function abilityRollHtml(unitId,a){
  // Renders the roll button + result for a table ability in the tracker
  var key=unitId+'::'+a.name;
  var res=abilityRolls[key];
  var h='<div class="d12-ability">';
  h+='<button class="btn d12-roll-btn" data-action="roll-d12" data-uid="'+unitId+'" data-ability="'+esc(a.name)+'">🎲 Tirar d12</button>';
  if(res){
    h+='<div class="d12-result d12-'+res.band+'">';
    h+='<div class="d12-roll-num">🎲 '+res.roll+'</div>';
    h+='<div class="d12-band-label d12-label-'+res.band+'">'+bandLabel(res.band)+(res.band==='b12'?' ✨':'')+'</div>';
    h+='<div class="d12-band-text">'+esc(res.text)+'</div>';
    if(res.echoCheck){
      var ec=res.echoCheck;
      h+='<div class="d12-echo '+(ec.passed?'echo-pass':'echo-slip')+'">Echo check: d20 ('+ec.d20+') + Echo ('+ec.echo+') = '+ec.total+' vs DC '+ec.dc+' → '+(ec.passed?'✓ MAX activado':'⤓ baja a Strong')+'</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

/* ══════ IN-COMBAT SQUAD GROUPING ══════ */
var combatGroupMode=false;
var combatGroupSelected=[];
var collapsedSquads={};

function toggleCombatGroupMode(){
  combatGroupMode=!combatGroupMode;
  combatGroupSelected=[];
  renderSession();
}
function toggleCombatGroupSelect(uid){
  var i=combatGroupSelected.indexOf(uid);
  if(i>-1)combatGroupSelected.splice(i,1);
  else combatGroupSelected.push(uid);
  renderSession();
}
function confirmCombatGroup(){
  if(combatGroupSelected.length<2){alert('Selecciona al menos 2 enemigos para agrupar');return}
  // Find which order-entries hold these units, remove them
  var sel=combatGroupSelected.slice();
  // Remove selected units from their current entries (units or squads)
  combat.order=combat.order.filter(function(e){
    if(e.type==='unit')return sel.indexOf(e.id)===-1;
    if(e.type==='squad'){e.members=e.members.filter(function(m){return sel.indexOf(m)===-1});return e.members.length>0}
    return true;
  });
  // Create new squad
  var firstUnit=combat.units.find(function(u){return u.id===sel[0]});
  var sqName='Escuadrón: '+(firstUnit?firstUnit.name.replace(/ #\d+$/,''):'Enemigos');
  var newSquad={type:'squad',id:'squad-'+uid(),name:sqName,members:sel.slice(),init:0};
  // Insert at end (user can move with arrows)
  combat.order.push(newSquad);
  combatGroupMode=false;combatGroupSelected=[];
  if(combat.turnIndex>=combat.order.length)combat.turnIndex=0;
  renderSession();
}
function addToExistingSquad(squadId){
  if(combatGroupSelected.length<1){alert('Selecciona enemigos para agregar');return}
  var sel=combatGroupSelected.slice();
  var squad=combat.order.find(function(e){return e.type==='squad'&&e.id===squadId});
  if(!squad)return;
  // Remove selected from other entries
  combat.order=combat.order.filter(function(e){
    if(e.type==='unit')return sel.indexOf(e.id)===-1;
    if(e.type==='squad'&&e.id!==squadId){e.members=e.members.filter(function(m){return sel.indexOf(m)===-1});return e.members.length>0}
    return true;
  });
  sel.forEach(function(uid){if(squad.members.indexOf(uid)===-1)squad.members.push(uid)});
  combatGroupMode=false;combatGroupSelected=[];
  if(combat.turnIndex>=combat.order.length)combat.turnIndex=0;
  renderSession();
}
function reviveUnit(uid){
  var u=combat.units.find(function(x){return x.id===uid});if(!u)return;
  pendingReviveId=uid;
  var h='<div class="modal-overlay"><div class="modal"><div class="modal-title">Revivir '+esc(u.name)+'</div>';
  h+='<div class="form-section"><div class="form-label">¿Con cuánto HP vuelve? (máx '+u.hpMax+')</div><input class="form-input" id="revive-hp" type="number" min="1" max="'+u.hpMax+'" value="'+u.hpMax+'" autofocus></div>';
  h+='<div class="modal-actions"><button class="btn" data-action="close-modal">Cancelar</button><button class="btn btn-primary" data-action="confirm-revive">Revivir</button></div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
  setTimeout(function(){var inp=document.getElementById('revive-hp');if(inp){inp.focus();inp.onkeypress=function(e){if(e.key==='Enter')confirmRevive()}}},50);
}
var pendingReviveId=null;
function confirmRevive(){
  if(!pendingReviveId)return;
  var u=combat.units.find(function(x){return x.id===pendingReviveId});if(!u)return;
  var hp=parseInt(document.getElementById('revive-hp').value)||1;
  u.hp=Math.max(1,Math.min(u.hpMax,hp));
  u.actions={mov:false,act1:false,act2:false};
  pendingReviveId=null;
  closeModal();renderSession();
}
function ungroupCombatSquad(squadId){
  var sqIdx=combat.order.findIndex(function(e){return e.type==='squad'&&e.id===squadId});
  if(sqIdx===-1)return;
  var squad=combat.order[sqIdx];
  // Replace squad entry with individual unit entries
  var unitEntries=squad.members.map(function(m){return {type:'unit',id:m}});
  combat.order.splice.apply(combat.order,[sqIdx,1].concat(unitEntries));
  renderSession();
}

function entryUnits(entry){
  if(!entry)return[];
  if(entry.type==='squad')return entry.members.map(function(mid){return combat.units.find(function(u){return u.id===mid})}).filter(Boolean);
  var u=combat.units.find(function(x){return x.id===entry.id});return u?[u]:[];
}
function entryLabel(entry){
  if(entry.type==='squad')return entry.name;
  var u=combat.units.find(function(x){return x.id===entry.id});return u?u.name:'?';
}
function entryAllDead(entry){var us=entryUnits(entry);return us.length>0&&us.every(function(u){return u.type==='creature'&&u.hp<=0})}
function entryIsPlayer(entry){return entry.type==='unit'&&entryUnits(entry)[0]&&entryUnits(entry)[0].type==='player'}

function renderSession(){var el=document.getElementById('session-content');if(!el)return;if(!combat){var hasPlayers=dbGetAll('players').length>0;el.innerHTML='<div class="empty-state"><div class="empty-state-title">No hay combate activo</div><div class="empty-state-desc">Inicia un combate desde una escena de tipo Combate en Campaña'+(hasPlayers?', o arranca un combate libre.':'.')+'</div>'+(hasPlayers?'<button class="btn btn-primary" onclick="startEmptyCombat()">Combate libre</button>':'')+'</div>';return}
var h='<div class="tracker-bar"><div style="font-size:17px;font-weight:700;font-family:var(--serif);flex:1">'+esc(combat.name)+'</div><div class="tracker-stat"><div class="tracker-stat-label">RONDA</div><div class="tracker-stat-value">'+combat.round+'</div></div><div class="tracker-stat"><div class="tracker-stat-label">TURNO</div><div class="tracker-stat-value">'+(combat.turnIndex+1)+'/'+combat.order.length+'</div></div><button class="btn'+(combatGroupMode?' btn-primary':'')+'" data-action="toggle-group-mode">'+(combatGroupMode?'✓ Agrupando...':'⊞ Agrupar')+'</button><button class="btn btn-gold" data-action="add-to-combat">+ Unidad</button><button class="btn btn-primary" data-action="next-turn">Siguiente →</button><button class="btn" data-action="end-combat">Terminar</button></div>';
// Group mode banner
if(combatGroupMode){
  h+='<div class="group-mode-banner"><div style="flex:1"><strong>Modo agrupar:</strong> toca los enemigos que quieras unir en un escuadrón ('+combatGroupSelected.length+' seleccionados)</div>';
  if(combatGroupSelected.length>=2)h+='<button class="btn btn-gold" data-action="confirm-combat-group">⊞ Crear escuadrón</button>';
  // existing squads to add to
