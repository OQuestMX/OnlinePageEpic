      }
      if(_page&&_page.id){
        p.wikiId=_page.id;
        p.links=p.links||[];
        if(!p.links.some(function(l){return l.kind==="wiki"&&l.id===_page.id;})){
          p.links.push({kind:"wiki",id:_page.id,title:_page.title});
        }
        showHint("Ficha de Wiki lista y ligada: "+title);
      }
    }catch(_e){}
  }
  closeEdit(); renderPins();
};
root.getElementById("fDelete").onclick=function(){
  var m=cur();m.pins=m.pins.filter(function(z){return z.id!==state.editingId;});
  if(state.openId===state.editingId)state.openId=null; closeEdit(); renderPins();
};

/* ---------- Export / Import ---------- */
var expScrim=root.getElementById("expScrim");
root.getElementById("btnExport").onclick=function(){
  var m=cur();
  root.getElementById("expMapName").textContent=m.name;
  var data={
    pins:m.pins.map(function(p){return {x:+p.x.toFixed(4),y:+p.y.toFixed(4),type:p.type,title:p.title,img:p.img,short:p.short,lore:p.lore,portal:!!p.sub};}),
    areas:m.areas.map(function(a){return {kind:a.kind||"faction",name:a.name,color:a.color,pts:a.pts.map(function(p){return {x:+p.x.toFixed(4),y:+p.y.toFixed(4)};})};}),
    routes:m.routes.map(function(r){return {kind:r.kind||"trade",name:r.name,color:r.color,pts:r.pts.map(function(p){return {x:+p.x.toFixed(4),y:+p.y.toFixed(4)};})};})
  };
  root.getElementById("expText").value=JSON.stringify(data,null,2);
  expScrim.classList.add("open");
};
root.getElementById("expClose").onclick=function(){expScrim.classList.remove("open");};
root.getElementById("expCopy").onclick=function(){var t=root.getElementById("expText");t.select();try{document.execCommand("copy");showHint("Copiado.");}catch(e){}};
root.getElementById("expLoad").onclick=function(){
  try{
    var data=JSON.parse(root.getElementById("expText").value), m=cur();
    var pinArr=Array.isArray(data)?data:(data.pins||[]);
    m.pins=pinArr.map(function(p){return P(+p.x,+p.y,TYPES[p.type]?p.type:"city",p.title||"Sin nombre",p.short||"",p.lore||"",{img:p.img||""});});
    if(!Array.isArray(data)){
      m.areas=(data.areas||[]).map(function(a){return {id:++uid,kind:a.kind||"faction",name:a.name||"Área",color:a.color||"#7a5c3e",pts:(a.pts||[]).map(function(p){return {x:+p.x,y:+p.y};})};});
      m.routes=(data.routes||[]).map(function(r){return {id:++uid,kind:r.kind||"trade",name:r.name||"Ruta",color:r.color||"#b8935a",pts:(r.pts||[]).map(function(p){return {x:+p.x,y:+p.y};})};});
    }
    state.openId=null;state.draft=null;renderPins();expScrim.classList.remove("open");
    showHint("Cargado: "+m.pins.length+" lugares, "+m.areas.length+" áreas, "+m.routes.length+" rutas.");
  }catch(e){showHint("Ese texto no es válido.");}
};

/* ---------- Ayuda ---------- */
root.getElementById("btnHelp").onclick=function(){showHint("📚 Capas: prende varias (👁) para verlas encimadas; ✎ elige cuál editas. En Lugares filtras por tipo. Un pin 🗺️ Submapa te lleva a otro mapa al tocarlo.");};

/* ---------- Lentes ---------- */
/* ---------- Panel de capas ---------- */
function renderLayers(){
  var inSub=stack.length>1;
  var list=inSub?LAYERS.filter(function(L){return L.key==="places";}):LAYERS;
  root.getElementById("layerList").innerHTML=list.map(function(L){
    var vis=!!state.visible[L.key], act=state.active===L.key;
    return '<div class="lyrow'+(act?" active":"")+'">'+
      '<button class="lyeye'+(vis?" on":"")+'" data-eye="'+L.key+'" title="Ver / ocultar">'+(vis?"👁":"◌")+'</button>'+
      '<button class="lyname" data-act="'+L.key+'"><span class="lyico">'+L.icon+'</span>'+L.label+'</button>'+
      '<span class="lyactive" title="Capa activa para editar">'+(act?"✎":"")+'</span></div>';
  }).join("");
  root.getElementById("typeSub").style.display=state.visible.places?"block":"none";
}
root.getElementById("layerList").addEventListener("click",function(e){
  var eye=e.target.closest("[data-eye]");
  if(eye){var k=eye.dataset.eye; state.visible[k]=!state.visible[k]; if(!state.visible[k]&&state.draft&&state.active===k)state.draft=null; renderLayers(); renderPins(); return;}
  var act=e.target.closest("[data-act]");
  if(act){var k2=act.dataset.act; state.active=k2; state.visible[k2]=true; state.draft=null; state.openId=null; renderLayers(); renderPins(); layerHint();}
});
root.getElementById("btnLayers").onclick=function(){
  var p=root.getElementById("layers"); p.classList.toggle("open");
  root.getElementById("btnLayers").classList.toggle("on",p.classList.contains("open"));
};
function layerHint(){
  var a=state.active;
  if(a==="places"){ showHint(state.mode==="edit"?"Editas Lugares: toca el mapa para crear un lugar.":"Capa activa: Lugares."); return; }
  var cfg=LENS_CFG[a], isArea=cfg&&cfg.group==="area", L=LAYERS.filter(function(x){return x.key===a;})[0], nm=L?L.label:a;
  if(state.mode!=="edit"){ showHint("Capa activa: "+nm+". Cambia a ✎ Editar para dibujar."); return; }
  showHint(isArea?"Editas "+nm+": toca las esquinas; luego 'Cerrar área'.":"Editas "+nm+": toca las paradas en orden; luego 'Terminar ruta'.");
}

/* ---------- Barra de dibujo ---------- */
function updateDraftBar(){
  var bar=root.getElementById("draftbar");
  if(!state.draft){bar.classList.remove("show");return;}
  bar.classList.add("show");
  var n=state.draft.pts.length, isArea=state.draft.group==="area", min=isArea?3:2;
  root.getElementById("dDoneLbl").textContent=isArea?"Cerrar área":"Terminar ruta";
  root.getElementById("draftInfo").textContent=(isArea?"Territorio":"Ruta")+": "+n+" punto"+(n===1?"":"s")+(n<min?" (mín. "+min+")":"");
  var done=root.getElementById("dDone"); done.disabled=(n<min); done.style.opacity=(n<min)?".5":"1";
}
root.getElementById("dUndo").onclick=function(){if(state.draft&&state.draft.pts.length){state.draft.pts.pop();renderPins();}};
root.getElementById("dCancel").onclick=function(){state.draft=null;renderPins();};
root.getElementById("dDone").onclick=function(){
  if(!state.draft)return; var isArea=state.draft.group==="area", min=isArea?3:2;
  if(state.draft.pts.length<min)return;
  openShapeForm(state.draft.group,state.draft.kind,null,state.draft.pts.slice());
};

/* ---------- Formulario de área / ruta ---------- */
var shapeScrim=root.getElementById("shapeScrim");
var SWATCHES=["#7a5c3e","#b8935a","#8a3a3a","#3a6a8a","#4a7a4a","#7a4a7a","#a0662c","#4a4a5a"];
function renderSwatches(sel){
  root.getElementById("shapeSwatches").innerHTML=SWATCHES.map(function(c){
    return '<button type="button" data-sw="'+c+'" class="'+(c.toLowerCase()===String(sel).toLowerCase()?"on":"")+'" style="background:'+c+'"></button>';}).join("");
}
root.getElementById("shapeSwatches").addEventListener("click",function(e){
  var b=e.target.closest("[data-sw]");if(!b)return;
  root.getElementById("shapeColor").value=b.dataset.sw; renderSwatches(b.dataset.sw);});
root.getElementById("shapeColor").addEventListener("input",function(){renderSwatches(this.value);});
function openShapeForm(group,kind,id,pts){
  state.shape={group:group,kind:kind,id:id,pts:pts||null};
  var isArea=group==="area";
  var existing=id!=null?(isArea?cur().areas:cur().routes).find(function(z){return z.id===id;}):null;
  root.getElementById("shapeHeading").textContent=(existing?"Editar ":"Nueva ")+(KIND_LABEL[kind]||"forma");
  root.getElementById("shapeNameLbl").textContent=KIND_NAMELBL[kind]||"Nombre";
  root.getElementById("shapeName").value=existing?existing.name:"";
  var col=existing?existing.color:(KIND_COLOR[kind]||"#7a5c3e");
  root.getElementById("shapeColor").value=col; renderSwatches(col);
  root.getElementById("shapeDelete").style.display=existing?"":"none";
  shapeScrim.classList.add("open");
  setTimeout(function(){root.getElementById("shapeName").focus();},60);
}
function editShapeById(group,id){
  var isArea=group==="area";
  var it=(isArea?cur().areas:cur().routes).find(function(z){return z.id===id;});
  if(!it)return;
  openShapeForm(group,it.kind||(isArea?"faction":"trade"),id,null);
}
root.getElementById("shapeCancel").onclick=function(){shapeScrim.classList.remove("open");state.shape=null;};
root.getElementById("shapeSave").onclick=function(){
  if(!state.shape)return; var isArea=state.shape.group==="area";
  var name=root.getElementById("shapeName").value.trim()||(isArea?"Área":"Ruta");
  var color=root.getElementById("shapeColor").value;
  var list=isArea?cur().areas:cur().routes;
  if(state.shape.id!=null){var it=list.find(function(z){return z.id===state.shape.id;});if(it){it.name=name;it.color=color;}}
  else{list.push({id:++uid,kind:state.shape.kind,name:name,color:color,pts:state.shape.pts});state.draft=null;}
  shapeScrim.classList.remove("open");state.shape=null;renderPins();
};
root.getElementById("shapeDelete").onclick=function(){
  if(!state.shape||state.shape.id==null)return; var isArea=state.shape.group==="area";
  if(isArea)cur().areas=cur().areas.filter(function(z){return z.id!==state.shape.id;});
  else cur().routes=cur().routes.filter(function(z){return z.id!==state.shape.id;});
  shapeScrim.classList.remove("open");state.shape=null;renderPins();
};

/* ---------- Conexiones: handlers ---------- */
root.getElementById("fLinksList").addEventListener("click",function(e){var b=e.target.closest("[data-rmlink]");if(!b)return;editLinks.splice(+b.dataset.rmlink,1);renderLinksList();});
root.getElementById("fLinkAdd").onclick=function(){root.getElementById("linkSearch").value="";renderLinkResults("");root.getElementById("linkScrim").classList.add("open");setTimeout(function(){root.getElementById("linkSearch").focus();},60);};
root.getElementById("linkClose").onclick=function(){root.getElementById("linkScrim").classList.remove("open");};
root.getElementById("linkSearch").addEventListener("input",function(){renderLinkResults(this.value);});
root.getElementById("linkResults").addEventListener("click",function(e){var b=e.target.closest("[data-add]");if(!b)return;var o;try{o=JSON.parse(b.dataset.add);}catch(_){return;}if(!editLinks.some(function(l){return l.kind===o.kind&&l.id===o.id;}))editLinks.push(o);renderLinksList();renderLinkResults(root.getElementById("linkSearch").value);});
root.getElementById("loreConns").addEventListener("click",function(e){var b=e.target.closest("[data-openconn]");if(!b)return;var o;try{o=JSON.parse(b.dataset.openconn);}catch(_){return;}loreEl.classList.remove("open");openConn(o.kind,o.id,o.title);});

/* ---------- Init ---------- */
var _shown=false;
function show(){ if(!_shown){_shown=true; renderFilters(); renderLayers(); loadMap(); showHint("📚 Capas: 👁 prende/apaga y se superponen · ✎ marca cuál editas · 🗺 un pin de submapa te lleva a otro mapa."); } else { fit(); } }
window.addEventListener("resize",function(){ if(_shown)apply(); });

return {show:show};
};</script>
