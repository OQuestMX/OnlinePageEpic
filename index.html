  h+='<button class="btn" data-action="toggle-group-mode">Cancelar</button></div>';
}
// Initiative bar — one chip per entry (unit or squad)
h+='<div class="initiative-bar">';
combat.order.forEach(function(entry,idx){
  var cls='init-chip';
  if(idx===combat.turnIndex)cls+=' active';
  if(idx<combat.turnIndex)cls+=' done';
  if(entryAllDead(entry))cls+=' dead';
  if(entryIsPlayer(entry))cls+=' player';
  if(entryIsPlayer(entry)&&idx>combat.turnIndex)cls+=' sinergia-eligible';
  var label;
  if(entry.type==='squad')label='⊞'+entryUnits(entry).length;
  else{var u=entryUnits(entry)[0];label=u?(u.type==='player'?u.initial:esc(u.name).substring(0,6)):'?'}
  h+='<div class="init-chip-wrap"><div class="init-arrows"><button class="init-arrow" data-action="move-init-entry" data-idx="'+idx+'" data-dir="-1"'+(idx===0?' disabled':'')+'>‹</button><button class="init-arrow" data-action="move-init-entry" data-idx="'+idx+'" data-dir="1"'+(idx===combat.order.length-1?' disabled':'')+'>›</button></div><div class="'+cls+'" data-action="scroll-to-entry" data-idx="'+idx+'" title="'+esc(entryLabel(entry))+'">'+label+'</div></div>';
});
h+='</div>';
// Synergy reminder
var sp=[];combat.order.forEach(function(entry,idx){if(entryIsPlayer(entry)&&idx>combat.turnIndex){var u=entryUnits(entry)[0];if(u)sp.push(u.name)}});
if(sp.length)h+='<div class="synergy-reminder">⚡ <strong>Sinergia disponible:</strong> '+sp.map(esc).join(', ')+' aún no actúan — pueden combinar acciones para sumar efectos.</div>';
// Render each entry
combat.order.forEach(function(entry,idx){
  var isActive=idx===combat.turnIndex;
  if(entry.type==='squad'){
    var collapsed=collapsedSquads[entry.id]!==false; // default collapsed (undefined => true)
    var members=entryUnits(entry);
    var livingCount=members.filter(function(m){return m.hp>0}).length;
    h+='<div class="squad-block'+(isActive?' active-squad':'')+'" id="entry-'+idx+'"><div class="squad-block-head"><span style="flex:1;cursor:pointer" data-action="toggle-squad-collapse" data-id="'+entry.id+'">'+(collapsed?'▸':'▾')+' '+esc(entry.name)+' <span style="font-size:12px;color:var(--ink3)">· '+livingCount+'/'+members.length+' vivos · turno compartido</span></span>';
    if(isActive)h+='<button class="btn btn-primary" style="font-size:12px;padding:4px 10px;min-height:32px" data-action="end-squad-turn">Terminar escuadrón ✓</button>';
    h+='<button class="btn" style="font-size:12px;padding:4px 10px;min-height:32px" data-action="ungroup-combat-squad" data-id="'+entry.id+'">⊟</button></div>';
    if(!collapsed){members.forEach(function(u){h+=renderUnitCard(u,isActive)})}
    else{h+='<div class="squad-collapsed-preview">';members.forEach(function(u){h+='<span class="squad-mini'+(u.hp<=0?' dead':'')+'">'+esc(u.name.replace(/^.*#/,'#'))+' '+(u.hp>0?u.hp+'hp':'☠')+'</span>'});h+='</div>'}
    h+='</div>';
  } else {
    var u=entryUnits(entry)[0];if(u){h+='<div id="entry-'+idx+'">'+renderUnitCard(u,isActive)+'</div>'}
  }
});
// GRAVEYARD
var deadUnits=combat.units.filter(function(u){return u.type==='creature'&&u.hp<=0});
if(deadUnits.length){
  h+='<div class="graveyard"><div class="form-label" style="color:var(--ink3)">⚰️ CEMENTERIO ('+deadUnits.length+')</div><div class="graveyard-list">';
  deadUnits.forEach(function(u){h+='<div class="graveyard-unit"><span class="graveyard-name">☠ '+esc(u.name)+(u.role?' '+roleBadge(u.role):'')+'</span><button class="btn" style="font-size:12px;padding:4px 10px;min-height:32px" data-action="revive-unit" data-id="'+u.id+'">Revivir</button></div>'});

}
// Lair
if(combat.lairActions.length){h+='<div class="lair-panel"><div class="form-label" style="color:var(--orange)">LAIR ACTIONS — Ronda '+combat.round+'</div>';combat.lairActions.forEach(function(la){h+='<div class="lair-action-btn'+(la.used?' used':'')+'" data-action="use-lair" data-id="'+la.id+'"><input type="checkbox" style="width:20px;height:20px;pointer-events:none" '+(la.used?'checked':'')+'> '+esc(la.text)+'</div>'});h+='</div>'}
// Echo
h+='<div class="echo-panel"><div class="form-label" style="color:var(--gold)">ECHO POINTS</div>';dbGetAll('players').forEach(function(p){h+='<div class="echo-row"><div style="display:flex;align-items:center;gap:10px">'+avatarHtml(p)+'<div class="echo-player-name">'+esc(p.name)+'</div></div><div style="display:flex;align-items:center;gap:8px"><div class="echo-count">'+(p.echo||0)+'</div><button class="echo-btn" data-action="add-echo-tracker" data-id="'+p.id+'">+1</button></div></div>'});h+='</div>';
el.innerHTML=h;}

function renderUnitCard(u,isAct){

  else h+='<div><div class="unit-name">'+esc(u.name)+(u.isVillain?' <span style="color:var(--red);font-size:11px">VILLANO</span>':'')+(u.role?' '+roleBadge(u.role):'')+' <span style="font-size:12px;color:var(--ink4)">'+(isExp?'▲':'▼')+'</span></div><div class="unit-meta">Daño '+esc(u.dmg)+(u.resist?' · Resist: '+esc(u.resist):'')+' <span class="difficulty-tag diff-'+u.diff+'">'+diffLabel(u.diff)+'</span></div></div>';

  h+='</div>';
  if(u.type==='creature'){var pct=Math.round((u.hp/u.hpMax)*100);h+='<div class="hp-section"><div class="hp-display" style="color:'+hpColor(pct)+'">'+u.hp+'<span style="font-size:13px;color:var(--ink4)">/'+u.hpMax+'</span></div><div class="hp-bar"><div class="hp-fill" style="width:'+pct+'%;background:'+hpColor(pct)+'"></div></div></div>'}
  h+='<div class="actions-row"><label class="action-check"><input type="checkbox" '+(u.actions.mov?'checked':'')+' onchange="toggleAction(\''+u.id+'\',\'mov\')"> Mov</label><label class="action-check"><input type="checkbox" '+(u.actions.act1?'checked':'')+' onchange="toggleAction(\''+u.id+'\',\'act1\')"> Acción 1</label><label class="action-check"><input type="checkbox" '+(u.actions.act2?'checked':'')+' onchange="toggleAction(\''+u.id+'\',\'act2\')"> Acción 2</label></div>';
  if(isExp&&u.abilities&&u.abilities.length){h+='<div class="abilities-compact"><div class="form-label" style="margin-bottom:6px">HABILIDADES</div>';u.abilities.forEach(function(a){h+='<div class="ability-line"><span class="ability-name">'+esc(a.name)+'</span> <span style="color:var(--ink4)">['+esc(a.type)+']</span>'+(a.cost?' <span style="color:var(--gold)">'+esc(a.cost)+'</span>':'')+'<div style="font-size:12px;color:var(--ink3)">'+esc(a.desc)+'</div>'+(a.tabla&&u.type==='player'?abilityRollHtml(u.id,a):'')+'</div>'});h+='</div>'}
  h+='</div>';
  return h;
}

/* ══════════════════════════════════════════════
   INITIATIVE SETUP + SQUADS
   ══════════════════════════════════════════════ */
var initSetup=null; // {units:[], squads:{}, selected:[]}

function buildCombatUnits(scene){
  var units=[];
  var P=scene.participants||{};
  var heroIds=P.heroIds&&P.heroIds.length?P.heroIds:dbGetAll('players').map(function(p){return p.id});
  dbGetAll('players').forEach(function(p){if(heroIds.indexOf(p.id)>-1)units.push(unitFromPlayer(p))});
  if(P.creatureIds)P.creatureIds.forEach(function(ci){var c=getCreatureById(ci.creatureId);if(!c)return;for(var i=1;i<=ci.qty;i++)units.push(unitFromCreature(c,i,ci.qty))});
  if(P.villainIds)P.villainIds.forEach(function(vid){var v=dbGetById('villains',vid);if(v)units.push(unitFromVillain(v))});
  return units;
}

function openInitiativeSetup(sceneId){
  var scene=dbGetById('scenes',sceneId);if(!scene)return;
  var units=buildCombatUnits(scene);
  initSetup={sceneId:sceneId,sceneName:scene.name,units:units,init:{},squads:[],selected:[],lairActions:(scene.lairActions||[])};
  // default initiative 0 for all
  units.forEach(function(u){initSetup.init[u.id]=''});
  nav('initiative');
}

function startCombatDirectly(sceneId){
  // Skip setup - use default order
  var scene=dbGetById('scenes',sceneId);if(!scene)return;
  var units=buildCombatUnits(scene);
  expandedUnits={};
  combat={name:scene.name,round:1,turnIndex:0,units:units,order:units.map(function(u){return {type:'unit',id:u.id}}),lairActions:(scene.lairActions||[]).map(function(la,i){return{id:'la'+i,text:la,used:false}})};
  nav('session');
}

function toggleInitSelect(uid){
  var i=initSetup.selected.indexOf(uid);
  if(i>-1)initSetup.selected.splice(i,1);
  else initSetup.selected.push(uid);
  renderInitiative();
}

function groupSelectedSquad(){
  var sel=initSetup.selected.filter(function(uid){var u=initSetup.units.find(function(x){return x.id===uid});return u&&u.type==='creature'});
  if(sel.length<2){alert('Selecciona al menos 2 enemigos para agrupar');return}
  // Remove these from any existing squad
  initSetup.squads.forEach(function(sq){sq.members=sq.members.filter(function(m){return sel.indexOf(m)===-1})});
  initSetup.squads=initSetup.squads.filter(function(sq){return sq.members.length>0});
  // Create new squad
  var name=initSetup.units.find(function(u){return u.id===sel[0]}).name.replace(/ #\d+$/,'');
  initSetup.squads.push({id:'squad-'+uid(),name:'Escuadrón: '+name,members:sel.slice()});
  initSetup.selected=[];
  renderInitiative();
}

function ungroupSquad(squadId){
  initSetup.squads=initSetup.squads.filter(function(sq){return sq.id!==squadId});
  renderInitiative();
}

function setInitValue(id,val){initSetup.init[id]=val}

function confirmInitiative(){
  var units=initSetup.units;
  var squads=initSetup.squads;
  // Build entries: squads + ungrouped units
  var groupedIds={};
  squads.forEach(function(sq){sq.members.forEach(function(m){groupedIds[m]=sq.id})});
  var entries=[];
  // Squad entries
  squads.forEach(function(sq){
    var initVal=parseFloat(initSetup.init['sq-'+sq.id])||0;
    entries.push({type:'squad',id:sq.id,name:sq.name,members:sq.members.slice(),init:initVal});
  });
  // Ungrouped units
  units.forEach(function(u){
    if(groupedIds[u.id])return;
    var initVal=parseFloat(initSetup.init[u.id])||0;
    entries.push({type:'unit',id:u.id,init:initVal});
  });
  // Sort by initiative descending
  entries.sort(function(a,b){return b.init-a.init});
  // Build combat
  expandedUnits={};
  combat={name:initSetup.sceneName,round:1,turnIndex:0,units:units,order:entries,
    lairActions:initSetup.lairActions.map(function(la,i){return{id:'la'+i,text:la,used:false}})};
  initSetup=null;
  nav('session');
}

function renderInitiative(){
  var el=document.getElementById('initiative-content');if(!el)return;
  if(!initSetup){el.innerHTML='<div class="empty-state"><div class="empty-state-desc">Sin combate por configurar.</div></div>';return}
  if(!initSetup.units.length){el.innerHTML='<div class="init-setup-wrap"><div class="init-setup-header"><div class="detail-name">Iniciativa — '+esc(initSetup.sceneName)+'</div><button class="btn" data-action="cancel-init">← Cancelar</button></div><div class="empty-state"><div class="empty-state-title">Esta escena no tiene combatientes</div><div class="empty-state-desc">Agrega héroes (en Personajes) o enemigos (edita la escena y añade criaturas/villanos) antes de iniciar el combate.</div></div></div>';return}
  var groupedIds={};
  initSetup.squads.forEach(function(sq){sq.members.forEach(function(m){groupedIds[m]=sq.id})});
  var heroes=initSetup.units.filter(function(u){return u.type==='player'});
  var enemies=initSetup.units.filter(function(u){return u.type==='creature'});
  var h='<div class="init-setup-wrap">';
  h+='<div class="init-setup-header"><div class="detail-name">Iniciativa — '+esc(initSetup.sceneName)+'</div><button class="btn" data-action="cancel-init">← Cancelar</button></div>';
  h+='<div style="font-size:14px;color:var(--ink3);margin-bottom:16px">Escribe el número de iniciativa de cada unidad. Selecciona enemigos y agrúpalos en escuadrones (comparten turno). Orden: mayor a menor.</div>';
  // Heroes
  h+='<div class="form-label">HÉROES</div>';
  heroes.forEach(function(u){
    h+='<div class="init-row"><div class="init-row-info">'+avatarHtml(u,'width:36px;height:36px;font-size:15px;')+'<div><div class="init-row-name">'+esc(u.name)+'</div><div class="init-row-meta">'+esc(u.cls||'')+'</div></div></div>';
    h+='<input type="number" class="init-input" placeholder="—" value="'+esc(initSetup.init[u.id]||'')+'" oninput="setInitValue(\''+u.id+'\',this.value)"></div>';
  });
  // Squads
  if(initSetup.squads.length){
    h+='<div class="form-label" style="margin-top:16px">ESCUADRONES</div>';
    initSetup.squads.forEach(function(sq){
      h+='<div class="init-squad"><div class="init-squad-head"><div><input type="text" class="squad-name-input" value="'+esc(sq.name)+'" oninput="updateSquadName(\''+sq.id+'\',this.value)"><div class="init-row-meta">'+sq.members.length+' miembros · turno compartido</div></div><div style="display:flex;align-items:center;gap:8px"><input type="number" class="init-input" placeholder="—" value="'+esc(initSetup.init['sq-'+sq.id]||'')+'" oninput="setInitValue(\'sq-'+sq.id+'\',this.value)"><button class="delete-btn" data-action="ungroup-squad" data-id="'+sq.id+'" title="Deshacer escuadrón">⊟</button></div></div>';
      h+='<div class="init-squad-members">';
      sq.members.forEach(function(mid){var m=initSetup.units.find(function(x){return x.id===mid});if(m)h+='<span class="squad-member-chip">'+esc(m.name)+'</span>'});
      h+='</div></div>';
    });
  }
  // Ungrouped enemies
  var ungrouped=enemies.filter(function(u){return !groupedIds[u.id]});
  if(ungrouped.length){
    h+='<div class="form-label" style="margin-top:16px">ENEMIGOS '+(initSetup.selected.length?'('+initSetup.selected.length+' seleccionados)':'')+'</div>';
    ungrouped.forEach(function(u){
      var seld=initSetup.selected.indexOf(u.id)>-1;
      h+='<div class="init-row'+(seld?' init-selected':'')+'"><div class="init-row-info"><input type="checkbox" '+(seld?'checked':'')+' data-action="init-select" data-id="'+u.id+'" style="width:20px;height:20px"><div><div class="init-row-name">'+esc(u.name)+(u.role?' '+roleBadge(u.role):'')+'</div><div class="init-row-meta">HP '+u.hpMax+' · '+esc(u.dmg||'')+'</div></div></div>';
      h+='<input type="number" class="init-input" placeholder="—" value="'+esc(initSetup.init[u.id]||'')+'" oninput="setInitValue(\''+u.id+'\',this.value)"></div>';
    });
    if(initSetup.selected.length>=2)h+='<button class="btn btn-gold" style="margin-top:8px" data-action="group-squad">⊞ Agrupar '+initSetup.selected.length+' en escuadrón</button>';
  }
  // Actions
  h+='<div class="init-setup-actions"><button class="btn" data-action="skip-init">Saltar (orden por defecto)</button><button class="btn btn-primary" data-action="confirm-init">⚔️ Iniciar combate</button></div>';
  h+='</div>';
  el.innerHTML=h;
}

// Returns all linkable entities: wiki pages, scenes, creatures, players
function allLinkables(){
  var out=[];
  allWikiPages().forEach(function(p){out.push({kind:'wiki',id:p.id,title:p.title,icon:'📄'})});
  dbGetAll('scenes').forEach(function(s){out.push({kind:'scene',id:s.id,title:s.name,icon:'🎬'})});
  allCreatures().forEach(function(c){out.push({kind:'creature',id:c.id,title:c.name,icon:'🐾'})});
  dbGetAll('players').forEach(function(p){out.push({kind:'player',id:p.id,title:p.name,icon:'🧙'})});
  dbGetAll('sessions').forEach(function(s){out.push({kind:'session',id:s.id,title:(s.sessionTitle||('Sesion '+(s.sessionNum||''))||'Sesion'),icon:'📔'})});
  return out;
}
// Open the link picker modal (used by wiki editor "Enlazar" button)
var linkPickerTarget=null; // 'editor' (insert into textarea) or 'connection' (add to connections panel)
function openLinkPicker(target){
  linkPickerTarget=target;
  var h='<div class="modal-overlay"><div class="modal modal-lg"><div class="modal-title">Enlazar a...</div>';
  h+='<input type="text" class="form-input" id="link-search" placeholder="Buscar página, escena, criatura o personaje..." oninput="renderLinkPickerResults(this.value)" style="margin-bottom:10px" autofocus>';
  h+='<div id="link-picker-results" class="link-picker-results">'+renderLinkPickerResultsHtml('')+'</div>';
  h+='<div class="modal-actions"><button class="btn" data-action="close-modal">Cancelar</button></div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
  setTimeout(function(){var i=document.getElementById('link-search');if(i)i.focus()},50);
}
function renderLinkPickerResultsHtml(q){
  var items=allLinkables();
  var query=(q||'').toLowerCase().trim();
  if(query)items=items.filter(function(it){return it.title.toLowerCase().indexOf(query)>-1});
  var h='';
  // If query doesn't match any wiki page exactly, offer to create it
  if(query){
    var exactWiki=allLinkables().some(function(it){return it.kind==='wiki'&&it.title.toLowerCase()===query});
    if(!exactWiki){
      h+='<div class="link-picker-item link-create" data-action="link-pick-create" data-title="'+esc(q.trim())+'"><span class="link-picker-icon">✚</span><span>Crear página "<strong>'+esc(q.trim())+'</strong>"</span></div>';
    }
  }
  if(!items.length&&!h)return '<div style="padding:12px;color:var(--ink4);font-size:13px">Sin resultados. Escribe para crear una página nueva.</div>';
  var groups={wiki:[],scene:[],creature:[],player:[]};
  items.forEach(function(it){if(groups[it.kind])groups[it.kind].push(it)});
  var labels={wiki:'Páginas',scene:'Escenas',creature:'Criaturas',player:'Personajes'};
  ['wiki','scene','creature','player'].forEach(function(k){
    if(groups[k].length){
      h+='<div class="link-picker-group">'+labels[k]+'</div>';
      groups[k].slice(0,8).forEach(function(it){
        h+='<div class="link-picker-item" data-action="link-pick" data-kind="'+it.kind+'" data-id="'+it.id+'" data-title="'+esc(it.title)+'"><span class="link-picker-icon">'+it.icon+'</span><span>'+esc(it.title)+'</span></div>';
      });
    }
  });
  return h;
}
function renderLinkPickerResults(q){
  var el=document.getElementById('link-picker-results');
  if(el)el.innerHTML=renderLinkPickerResultsHtml(q);
}
// When a link is picked
function pickLink(kind,id,title){
  if(linkPickerTarget==='editor'){
    insertLinkIntoEditor(title);
  } else if(linkPickerTarget==='connection'){
    addConnection(kind,id,title);
  } else if(linkPickerTarget==='game'){
    closeModal();
    openConnection(kind,id,title);
    return;
  }
  closeModal();
}
function pickLinkCreate(title){
  var page=wikiCreatePage(title);
  if(linkPickerTarget==='editor'){
    insertLinkIntoEditor(title);
  } else if(linkPickerTarget==='connection'){
    addConnection('wiki',page.id,title);
  } else if(linkPickerTarget==='game'){
    closeModal();
    currentWikiId=page.id;wikiEditing=true;nav('wiki');
    return;
  }
  closeModal();
}
// Insert [[title]] at cursor position in the wiki editor textarea
function insertLinkIntoEditor(title){
  var ta=document.getElementById('wiki-editor');
  if(!ta){return}
  var start=ta.selectionStart||0;
  var end=ta.selectionEnd||0;
  var val=ta.value;
  var insert='[['+title+']]';
  ta.value=val.substring(0,start)+insert+val.substring(end);
  saveWikiContent(ta.value);
  // Reposition cursor after insertion
  var newPos=start+insert.length;
  setTimeout(function(){ta.focus();ta.setSelectionRange(newPos,newPos)},10);
}
// CONNECTIONS PANEL — explicit related links stored on the page
function addConnection(kind,id,title){
  if(!currentWikiId)return;var _p=wikiGetPage(currentWikiId);if(_p&&_p._base)return;
  var page=wikiGetPage(currentWikiId);if(!page)return;
  var conns=page.connections||[];
  if(conns.some(function(c){return c.kind===kind&&c.id===id}))return; // no dupes
  conns.push({kind:kind,id:id,title:title});
  dbUpdate('wiki',currentWikiId,{connections:conns});
  renderWiki();
}
function removeConnection(kind,id){
  if(!currentWikiId)return;
  var page=wikiGetPage(currentWikiId);if(!page)return;
  var conns=(page.connections||[]).filter(function(c){return !(c.kind===kind&&c.id===id)});
  dbUpdate('wiki',currentWikiId,{connections:conns});
  renderWiki();
}
function openConnection(kind,id,title){
  if(kind==='wiki'){currentWikiId=id;wikiEditing=false;renderWiki()}
  else if(kind==='scene'){selectedSceneId=id;nav('scenes');renderSceneBuilder(id)}
  else if(kind==='creature'){selectedLibTab='bestiary';selectedLibItem=id;nav('library')}
  else if(kind==='player'){nav('players')}
  else if(kind==='session'){nav('journal')}
}
function connIcon(kind){return{wiki:'📄',scene:'🎬',creature:'🐾',player:'🧙'}[kind]||'🔗'}

var WIKI_SEED_FACTIONS=[
{id:'wbase-cheran',title:'Teocracia de Cherán',type:'faction',content:'# Declaración\n"Nuestro dios es el único. Él proveerá. Los infieles serán purificados. El fuego de Engar se esparcirá ante el retumbar de nuestra caballería."\n\n*Los Engari — El Pueblo que Ara*\n\n# Historia\nLos Engari nacieron en las estepas como una banda de mercenarios fanáticos que nadie tomaba en serio. Lo que los diferenciaba era su fe — una devoción total a **Engar Ab\'Calen**, el dios que ara la tierra para que brote la vida.\n\nGeneración tras generación, esa fe los forjó. El primer Palan\'Nur unificó las tribus dispersas y absorbió el Imperio de las Estepas. El segundo lo convirtió en un verdadero imperio. El tercero lo llevó a su cúspide.\n\nHoy son la potencia más temida de Avelir — no por tener el ejército más grande, sino porque tienen algo más peligroso: la certeza absoluta de que están en lo correcto.\n\n## Los Cuatro Palan\'Nur\n- **Anandëlion** — El Primero. El Saladino. Convirtió a los Engari de mercenarios fanáticos a fuerza imperial.\n- **Anandël** — El Segundo. El Ciro. Ejecutó el mestizaje entre los Engari y el pueblo de las estepas.\n- **[[Anan\'Nur]]** — El Tercero. El Darío. La cúspide institucional. Actualmente agonizando.\n- **[[An\'Fahal]]** — El Cuarto. El heredero débil, rodeado de generales extraordinarios que cargan el peso que él aún no puede sostener.\n\n# Gobierno\n**Teocracia.** El **Palan\'Nur** — el Ungido — ejecuta la voluntad divina. El **Palan\'Shar** — el Concilio sagrado — define qué es esa voluntad. Cuatro facciones compiten dentro del Palan\'Shar:\n- **Amin** — los ortodoxos. Fieles a Engar en su forma original y pura.\n- **Palan\'Umbar** — los gnósticos. La sombra que provoca la luz.\n- **Amin\'Kalam** — los iconoclastas. La fe pura sin representaciones físicas.\n- **Sar\'Qaim** — los jihadistas. La guerra sagrada es un mandato — no una opción.\n\n# Figuras Clave\n- **[[Anan\'Nur]]** — El Ungido que agoniza. Llevó a Cherán a su cúspide. Su muerte marcará una nueva era.\n- **[[An\'Fahal]]** — El heredero. Su nombre significa "el amanecer".\n- **[[Temürel]] — Abu\'Amin** — El Abuelo. El general más respetado sin título formal. La memoria viva del imperio. Tiene un plan que nadie conoce completamente.\n- **Los Sar\'Qaim** — Los que ejecutan en la oscuridad. Marchan hacia el norte purificando todo a su paso.\n\n# Situación Geopolítica\nCherán está en su momento más poderoso — y más inestable. La transición al cuarto Palan\'Nur está en marcha. Las facciones del Palan\'Shar compiten por influencia. Los Sar\'Qaim avanzan ejecutando purgas que despiertan una resistencia que nadie calculó. Aetharion los llama el nuevo demonio. Los pueblos del norte empiezan a unirse contra ellos.'},
{id:'wbase-vorin',title:'Casa Vorin',type:'faction',content:'# Declaración\n"El comercio es poder. La información es poder. Nosotros tenemos ambos. Todo tiene precio — incluyendo tú."\n\n*El Gremio — Los que mueven el mundo*\n\n# Historia\nCasa Vorin comenzó como un linaje élfico guerrero de alta alcurnia que estaba viniendo a menos. Fue **[[Caëlen Vorin\'el]]** — el hijo menor, el que nadie miraba — quien vio lo que los demás no podían: el mundo no necesitaba otro ejército. Necesitaba a alguien que financiara los ejércitos de todos los demás.\n\nCaëlen construyó la institución junto a sus hermanos — cada uno con un poder distinto. Hoy esos nombres son títulos hereditarios que se pasan mediante un proceso de adopción e indoctrinación que escandalizó al mundo élfico — y que hoy es el secreto más admirado y temido de Avelir.\n\nEntrar a Casa Vorin es el sueño de los más ambiciosos. Tu cara cambia. Tu nombre cambia. Tu historia desaparece. [[Caëlen Vorin\'el]] no solo fundó una institución. **Fundó una especie.**\n\n# Gobierno\n**Corporación hereditaria.** Cuatro títulos fundacionales:\n- **Caëlen** — El Arquitecto. Estratega supremo. Identidad secreta.\n- **Aldren, Voz de Casa Vorin** — El rostro diplomático. Las sonrisas que abren puertas.\n- **Ilvaën, Escudo de Casa Vorin** — La fuerza militar. La amenaza que nunca se nombra pero siempre se siente.\n- **Maëlor, Garra de Casa Vorin** — El maestro de las sombras. Secretos, inteligencia, vicios ajenos como moneda. Identidad secreta.\n\nCada título se replica en múltiples divisiones por Avelir. Por encima de todas las instancias existen **La Primera Voz**, **El Primer Escudo** y **La Primera Garra**. En la cúspide está **El Gremio** — la junta de todos los Caëlens activos. Sus decisiones se toman por consenso. Nadie sabe cuántos son. Nadie sabe quiénes son.\n\n# Figuras Clave\n- **[[Caëlen Vorin\'el]]** — El fundador. El hijo menor que convirtió un linaje guerrero en corporación mercantil. Su nombre es ahora un título.\n- **El Gremio** — La junta suprema. Cuando se mueve, ya consideraron cada consecuencia posible.\n- **Aldren** — Visto en tres capitales distintas en la misma semana. Nadie sabe qué está comprando.\n- **La Primera Garra** — El título más temido de Casa Vorin. Se dice que está activa.\n\n# Situación Geopolítica\nCasa Vorin teje planes dentro de planes, observando el movimiento de Cherán con interés calculado — y vendiendo información a todos los bandos simultáneamente. Acaban de mover una cantidad de oro que nadie puede rastrear. Todos deberían estar preocupados.'},
{id:'wbase-escarlata',title:'La Orden Escarlata',type:'faction',content:'# Declaración\n"No servimos a ningún rey. No tenemos sede. No tenemos ejército. Solo tenemos un código y la voluntad de morir por él. Llegamos cuando nadie más llega."\n\n*Las Hermandades — Los que llegan cuando nadie más llega*\n\n# Historia\nLa Orden nació de un acto de desobediencia que fue simultáneamente el más fiel al código que la fundó. **[[Ser Arthantos]]** — uno de los comandantes más honorados de **La Corte del Sol**, la mesa de caballeros más antigua de Urushan — supo de una invasión inminente a un pueblo completamente desamparado. Desafiando a Urushan, tomó a un grupo de caballeros y marchó a defenderlo.\n\nEn esa batalla enfrentó manifestaciones de Tel-Haud — ecos de la batalla que sigue ocurriendo en el interplano — e hizo el sacrificio máximo: **El Gran Sacrificio**. Ese cisma fundó algo que lleva 700 años existiendo sin rey, sin capital, sin ejército. [[Thecia]] se convirtió en La Cuna de la Orden.\n\nNo son muchos. Veinte caballeros de la Orden valen por mil soldados comunes — son multiplicadores de fuerza. Llegan, organizan, entrenan y lideran. Cuando la batalla termina, se van.\n\nEl mundo los considera anacronismos. **El mundo se equivoca.**\n\n# Gobierno\n**Descentralizado.** 17-18 hermandades independientes unidas solo por el **Juramento Escarlata**. Cada hermandad tiene un **Primero de la Mesa**. No hay líder global. Tres corrientes internas definen cómo cada hermandad interpreta el Juramento:\n- **Los Tantos** — defienden hasta morir. El Juramento no tiene excepciones.\n- **Los Platos** — negocian. Cuando llegan, algo va a costar.\n- **Los Normales** — evalúan caso por caso qué acción salva más vidas.\n\n**La Mesa Completa** — la coalición de todas las hermandades. En 700 años solo ha ocurrido dos veces. Cuando se convoca, el mundo sabe que algo sin precedente está ocurriendo.\n\n# Figuras Clave\n- **[[Ser Arthantos]]** — El fundador. El Galahad de Avelir. El más puro. Hizo el sacrificio máximo hace 700 años.\n- **[[Hemmal]]** — Dios patrono. La manifestación del Emperador en el plano mortal. Los caballeros lo invocan en combate.\n- **Ser Gianni du Mont** — Primero de la Mesa (Los Normales). Defendió Tol Varen junto a [[Arminio El Dorado]] y partió sin despedirse.\n- **[[El Sobreviviente]]** — Sobrevivió la destrucción de su hermandad. Está convocando La Mesa Completa por tercera vez en la historia. Nadie sabe qué vio esa noche.\n\n# Situación Geopolítica\nLa Orden se desvanece — el mundo político y comercial la dejó obsoleta. Pero en su momento más débil, la batalla entre el Emperador y Tel-Haud está alcanzando un clímax que rompe el interplano. Una hermandad entera fue destruida en una noche por criaturas que no pertenecen a este mundo. La Mesa Completa ha sido convocada.'},
{id:'wbase-aetharion',title:'Aetharion',type:'faction',content:'# Declaración\n"Evolución. Táctica. Estrategia. Temple. Magia al servicio de la victoria. El Jardín Eterno no para de crecer."\n\n*El Jardín Eterno — Evolución sin fin*\n\n# Historia\nDurante siglos las casas heráldicas que hoy forman Aetharion vivieron fragmentadas y humilladas bajo el peso del Primer Imperio. Generaciones enteras crecieron con la deuda de una derrota que no cometieron. Hasta que **[[Alendi Galathas]]** — Cúmulo de Estrellas, Casa Gal\'Calad — vio lo que nadie más podía ver: que la humillación podía convertirse en combustible.\n\nAlendi unificó las casas heráldicas no por conquista sino por legitimidad — era uno de ellos. Junto a **[[Anariel]]**, su compañera de toda la vida y arquitecta de su ventaja tecnológica, construyó el ejército más innovador que Avelir ha visto. No ganaron por número ni por territorio — ganaron porque mientras los demás seguían peleando con las mismas tácticas de siempre, **Aetharion estaba reinventando completamente la guerra**.\n\n# Gobierno\n**República Militar.** El **Arkhon Galas** lidera. Los **Primarcas** comandan las legiones — cada uno un genio en su dominio, toman decisiones en campo sin esperar órdenes. Los **Cónsules** representan al pueblo. **Heraldin Galas** controla la tecnología y la alquimia bélica. Las decisiones se toman en conjunto — pero siempre con la balanza inclinada hacia lo militar.\n\n# Figuras Clave\n- **[[Alendi Galathas]] — Arkhon Galas** — El Cúmulo de Estrellas. Fundador de Aetharion. A los 14 años huyó de la humillación de su familia. Vagó por el mundo hasta convertirse en el arquitecto del Jardín Eterno y de la toma de [[Tol Marin]].\n- **[[Anariel]] — Heraldin Galas** — La Heraldo. Arquitecta de la ventaja tecnológica de Aetharion. Brillante para la magia. Nadie entiende completamente de dónde viene su poder.\n- **Los Primarcas** — Los generales de Aetharion. Cada uno un genio en su dominio.\n- **Los Galadrim** — La guardia élite del Arkhon Galas. Hijos e hijas de las casas heráldicas. El entrenamiento más arduo del mundo.\n\n# Situación Geopolítica\nLas águilas del Jardín Eterno acaban de tomar **[[Tol Marin]]**. Urushan fue humillado — por primera vez en siglos alguien le ganó al Primer Imperio en batalla abierta. El equilibrio de poder cambió de manera definitiva. El mundo no volverá a ser el mismo.'},
{id:'wbase-urushan',title:'Urushan',type:'faction',content:'# Declaración\n"El Primer Imperio. La flota más antigua. La tradición más profunda. Llevamos milenios aquí — y seguiremos."\n\n*El Primer Imperio — Las espadas de la tradición*\n\n# Historia\nUrushan fue el primer gran imperio de Avelir. Construyeron las rutas marítimas que el mundo todavía usa. Su identidad está tejida de tradición, honor naval y la certeza de que han sobrevivido todo — y sobrevivirán esto también.\n\nDe su seno nació también el cisma más famoso de la historia: **La Corte del Sol** — su mesa de caballeros más antigua — vio partir a [[Ser Arthantos]] hacia la fundación de la Orden Escarlata hace 700 años.\n\n# Gobierno\n**Imperio naval.** **El Almirantazgo** — la cúpula que controla las rutas marítimas milenarias. **La Tormenta del Mar** — su facción militar más agresiva. **La Corte del Sol** — la tradición caballeresca más antigua de Avelir.\n\n# Figuras Clave\n- **[[Alarion]] — antes Aldric Von Rostov** — El traidor. Uno de sus mejores generales abandonó su nombre, su apellido y su lealtad. Desde las ruinas de **[[Ashlan]]** convoca a **Los Peregrinos**.\n- **La Tormenta del Mar** — La facción naval más agresiva. Prepara una respuesta que no será sutil.\n- **El Almirantazgo** — La cúpula naval del Primer Imperio.\n\n# Situación Geopolítica\nDerrotados en **[[Tol Marin]]** por primera vez en siglos. La traición de [[Alarion]] sangra por dentro. El Primer Imperio está herido — y un imperio herido con la flota más grande del mundo es más peligroso que nunca.'},
{id:'wbase-pueblos',title:'Los Pueblos sin Techo',type:'faction',content:'# Declaración\n"Sin trono. Sin templo. Sin cadenas. Libres antes que cualquier imperio existiera. Libres cuando todos hayan caído."\n\n*La Confederación — Los Libres*\n\n# Historia\nLos Pueblos sin Techo no son una facción — **son el mundo entre las facciones**. Todo lo que existe fuera de las seis instituciones principales de Avelir: tribus nómadas, confederaciones emergentes, pueblos costeros, civilizaciones antiguas que se separaron de Urushan, asentamientos fundados por caballeros de la Orden Escarlata, mercados flotantes de Casa Vorin, comunidades que le hacen la guerra a Aetharion desde las montañas.\n\nNo son un pueblo — son una idea: **la libertad no se pide, se vive.** Habitan las montañas, las fronteras y los espacios entre imperios que nadie reclama.\n\n# Gobierno\nNo tienen uno — esa es exactamente su identidad. **Los Consejeros** — líderes sin título fijo. **Los Caballeros Errantes** — los que van donde nadie más quiere ir.\n\n**La Confederación** — el recurso emergente. Una horda de tribus unificadas bajo un símbolo relacionado al cuervo, al buitre — animales que aparecen donde hay cambio y muerte. No tienen agenda cósmica. Son una fuerza natural de la historia que aparece cada cierto tiempo y sacude el tablero.\n\n# Figuras Clave\n- **[[Arminio El Dorado]]** — El Resistente de Tol Varen. Resistió lo imposible con apenas un puñado de hombres y caballeros errantes. Las montañas del norte se unen bajo su bandera.\n- **Los Consejeros** — Líderes sin título fijo.\n- **Los Caballeros Errantes** — Los que van donde nadie más quiere ir.\n\n# Situación Geopolítica\nLa Confederación avanza — y los imperios empiezan a prestar atención por primera vez, en el momento en que menos pueden permitirse otra crisis. No son el villano de la historia: **son el estrés que revela las grietas que ya existían.**'}

function wikiBacklinks(title){

    if(inContent||inConn)refs.push({action:'wiki-open',id:p.id,icon:p._base?'🔒':'📄',label:p.title});
  });
  dbGetAll('scenes').forEach(function(s){
    var st=s.setup||{};
    var text=[s.narrative,s.notes,st.hook,st.conflict,st.stakesFail,st.stakesWin,st.exit].join(' ');
    if(rx.test(text))refs.push({action:'open-scene-from-wiki',id:s.id,icon:'🎬',label:s.name});
  });
  var camp=dbLoad('campaign');
  if(camp){
    var obj=camp.objectives||{};
    var objText=[obj.main||'',obj.division||''].concat(obj.secondary||[]).join(' ');
    if(rx.test(objText))refs.push({action:'open-campaign-from-wiki',id:'',icon:'🎯',label:'Objetivos de campaña'});
    (camp.arcs||[]).forEach(function(arc,ai){

  }
  return refs;
}

  h+='<div class="modal-actions">';
  if(w.step===1){h+='<button class="btn" data-action="wizard-cancel">Cancelar</button><button class="btn btn-primary" data-action="wizard-next">Siguiente →</button>'}
  else{h+='<button class="btn" data-action="wizard-back">← Anterior</button><button class="btn btn-primary" data-action="wizard-save">Guardar escena</button>'}
  h+='</div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
}

function renderWizardStep1(){
  var w=sceneWizard;var s=w.setup;
  var h='';
  h+='<div class="form-section"><div class="form-label">Nombre</div><input class="form-input" id="wz-name" type="text" value="'+esc(w.name)+'" placeholder="Nombre de la escena"></div>';
  h+='<div class="form-section"><div class="form-label">Tipo</div><select class="form-input" id="wz-type" onchange="sceneWizard.type=this.value"><option value="narrative"'+(w.type==='narrative'?' selected':'')+'>Narrativa</option><option value="combat"'+(w.type==='combat'?' selected':'')+'>Combate</option></select></div>';
  h+='<div class="form-section"><div class="form-label">Hook</div><textarea class="form-input" id="wz-hook" placeholder="¿Cómo abre la escena?">'+esc(s.hook)+'</textarea></div>';
  h+='<div class="form-section"><div class="form-label">Conflicto</div><textarea class="form-input" id="wz-conflict" placeholder="¿Qué hay que resolver?">'+esc(s.conflict)+'</textarea></div>';
  h+='<div class="form-row"><div class="form-section"><div class="form-label">Si fallan</div><input class="form-input" id="wz-stakesFail" type="text" value="'+esc(s.stakesFail)+'"></div><div class="form-section"><div class="form-label">Si triunfan</div><input class="form-input" id="wz-stakesWin" type="text" value="'+esc(s.stakesWin)+'"></div></div>';
  h+='<div class="form-section"><div class="form-label">Beat de salida</div><textarea class="form-input" id="wz-exit" placeholder="¿Cómo conecta con lo siguiente?">'+esc(s.exit)+'</textarea></div>';
  h+='<div class="form-section"><div class="form-label">Notas DM</div><textarea class="form-input" id="wz-notes" placeholder="Música, recordatorios...">'+esc(w.notes)+'</textarea></div>';
  return h;
}

function saveWizardStep1(){
  var w=sceneWizard;if(!w)return;
  function gv(id){var e=document.getElementById(id);return e?e.value.trim():null}
  var v;
  if((v=gv('wz-name'))!==null)w.name=v;
  if((v=gv('wz-type'))!==null)w.type=v;
  if((v=gv('wz-hook'))!==null)w.setup.hook=v;
  if((v=gv('wz-conflict'))!==null)w.setup.conflict=v;
  if((v=gv('wz-stakesFail'))!==null)w.setup.stakesFail=v;
  if((v=gv('wz-stakesWin'))!==null)w.setup.stakesWin=v;
  if((v=gv('wz-exit'))!==null)w.setup.exit=v;
  if((v=gv('wz-notes'))!==null)w.notes=v;
}

/* Combined bestiary: gamedata base (locked) + user localStorage */
function allCreatures(){
  var userCreatures=dbGetAll('bestiary');
  var userIds={};userCreatures.forEach(function(c){userIds[c.id]=true});
  var baseCreatures=(G&&G.baseBestiary?G.baseBestiary:[]).filter(function(c){return !userIds[c.id]}).map(function(c){var copy=JSON.parse(JSON.stringify(c));copy._base=true;return copy});
  return userCreatures.concat(baseCreatures);
}

function renderWizardStep2(){
  var w=sceneWizard;
  var h='';

  // ── HEROES section (both types) ──
  var players=dbGetAll('players');
  h+='<div class="form-section"><div class="form-label">HÉROES EN ESTA ESCENA</div>';
  if(!players.length){h+='<div style="font-size:13px;color:var(--ink4);padding:8px 0">No hay jugadores. Créalos en Personajes.</div>'}
  else{players.forEach(function(p){var checked=w.heroIds.indexOf(p.id)>-1;var r=resolvePlayer(p);h+='<label class="hero-check'+(checked?' checked':'')+'" data-action="wz-toggle-hero" data-id="'+p.id+'"><div style="display:flex;align-items:center;gap:10px">'+avatarHtml(r)+'<div><div style="font-weight:600;font-size:14px">'+esc(r.name)+'</div><div style="font-size:12px;color:var(--ink3)">'+esc(r.cls)+' · Plano '+r.plano+'</div></div></div><div class="hero-check-box">'+(checked?'✓':'')+'</div></label>'})}
  h+='</div>';

  // ── ENEMIES section (both types, but difficulty meter only if combat) ──
  if(w.type==='combat')h+=renderDifficultyMeter();
  h+='<div class="form-section"><div class="form-label">'+(w.type==='combat'?'ENEMIGOS':'CRIATURAS / AMENAZAS')+' EN ESTA ESCENA</div>';
  if(!w.creatureIds.length&&!w.villainIds.length){h+='<div style="font-size:13px;color:var(--ink4);padding:8px 0">Ninguna seleccionada.</div>'}
  w.creatureIds.forEach(function(ci){var c=getCreatureById(ci.creatureId);if(!c)return;h+='<div class="selected-participant"><div><span class="creature-name">'+esc(c.name)+'</span> <span class="difficulty-tag diff-'+(c.difficulty||'medium')+'">'+diffLabel(c.difficulty)+'</span><div style="font-size:12px;color:var(--ink3)">HP '+c.hp+' · '+esc(c.dmg||'')+'</div></div><div class="qty-stepper"><button data-action="wz-qty" data-cid="'+ci.creatureId+'" data-delta="-1">−</button><span>'+ci.qty+'</span><button data-action="wz-qty" data-cid="'+ci.creatureId+'" data-delta="1">+</button></div></div>'});
  w.villainIds.forEach(function(vid){var v=dbGetById('villains',vid);if(!v)return;h+='<div class="selected-participant"><div><span class="creature-name" style="color:var(--red)">'+esc(v.name)+'</span> <span style="font-size:11px;color:var(--red)">VILLANO</span><div style="font-size:12px;color:var(--ink3)">HP '+(v.stats?v.stats.hp:'?')+' · '+esc(v.stats?v.stats.dmg:'')+'</div></div><button class="delete-btn" data-action="wz-remove-villain" data-id="'+vid+'">×</button></div>'});
  h+='</div>';
  // Creature picker with filters
  h+='<div class="form-section"><div class="form-label">+ AGREGAR DEL BESTIARIO</div>'+renderFilterBar('wiz')+'<input type="text" class="form-input" placeholder="Buscar nombre, habilidad, descripción..." oninput="filterWizPicker(this.value,\'creatures\')" style="margin-top:8px"><div class="wiz-picker" id="wiz-picker-creatures">'+renderWizCreaturePicker('')+'</div></div>';
  // Villain picker
  var villains=dbGetAll('villains');
  if(villains.length){h+='<div class="form-section"><div class="form-label">+ AGREGAR VILLANO</div><div class="wiz-picker" id="wiz-picker-villains">'+renderWizVillainPicker()+'</div></div>'}

  // ── NPCs section (both types) ──
  h+='<div class="form-section"><div class="form-label">NPCs EN ESTA ESCENA</div>';
  if(!w.npcIds.length){h+='<div style="font-size:13px;color:var(--ink4);padding:8px 0">Ninguno seleccionado.</div>'}
  w.npcIds.forEach(function(nid){var n=dbGetById('npcs',nid);if(!n)return;h+='<div class="selected-participant"><div><span class="creature-name">'+esc(n.name)+'</span><div style="font-size:12px;color:var(--ink3)">'+esc(n.role||'')+'</div>'+(n.voice?'<div style="font-size:12px;color:var(--ink4);font-style:italic">"'+esc(n.voice)+'"</div>':'')+'</div><button class="delete-btn" data-action="wz-remove-npc" data-id="'+nid+'">×</button></div>'});
  h+='</div>';
  var npcs=dbGetAll('npcs');
  if(npcs.length){h+='<div class="form-section"><div class="form-label">+ AGREGAR NPC</div><input type="text" class="form-input" placeholder="Buscar NPC..." oninput="filterWizPicker(this.value,\'npcs\')"><div class="wiz-picker" id="wiz-picker-npcs">'+renderWizNpcPicker('')+'</div></div>'}

  // ── LAIR ACTIONS (combat only) ──
  if(w.type==='combat'){
    h+='<div class="form-section"><div class="form-label">LAIR ACTIONS</div>';
    var defaults=(G&&G.defaultLairActions)?G.defaultLairActions:[];
    defaults.forEach(function(la){var checked=w.lairActions.indexOf(la)>-1;h+='<label class="wiz-check"><input type="checkbox" '+(checked?'checked':'')+' onchange="toggleWizLair(\''+esc(la).replace(/'/g,"\\'")+'\')"> '+esc(la)+'</label>'});
    h+='<input type="text" class="form-input" id="wz-custom-lair" placeholder="Lair action personalizada + Enter" style="margin-top:8px" onkeypress="if(event.key===\'Enter\'){addCustomLair(this.value);this.value=\'\'}">';
    w.lairActions.filter(function(la){return defaults.indexOf(la)===-1}).forEach(function(la){h+='<div class="custom-lair-tag">'+esc(la)+' <span data-action="wz-remove-lair" data-lair="'+esc(la)+'" style="cursor:pointer;color:var(--red)">×</span></div>'});
    h+='</div>';
  }
  // ── Combate y narrativa: lleva a la vista de página completa ──
  h+='<div class="wizard-builder-link"><div class="wizard-builder-hint">'+(w.type==='combat'?'⚡ Para iniciar combate y escribir el texto narrativo, ve a la vista completa.':'📝 Para escribir el texto narrativo completo de la escena, ve a la vista completa.')+'</div><button class="btn btn-gold" style="width:100%;justify-content:center" data-action="wizard-open-builder">'+(w.type==='combat'?'⚡ Combate y narrativa →':'📝 Texto narrativo →')+'</button></div>';
  return h;
}

function getCreatureById(id){var c=dbGetById('bestiary',id);if(c)return c;if(G&&G.baseBestiary){var b=G.baseBestiary.find(function(x){return x.id===id});if(b)return b}return null}

function renderDifficultyMeter(){
  var w=sceneWizard;
  var totalHp=0,count=0;
  w.creatureIds.forEach(function(ci){var c=getCreatureById(ci.creatureId);if(c){totalHp+=(c.hp||0)*ci.qty;count+=ci.qty}});
  w.villainIds.forEach(function(vid){var v=dbGetById('villains',vid);if(v){totalHp+=(v.stats?v.stats.hp:0);count++}});
  var players=dbGetAll('players').length||4;
  // Reference: each player can handle ~25 HP comfortably
  var ratio=totalHp/(players*25);
  var label,color,pct;
  if(ratio<0.5){label='Paseo';color='var(--green)';pct=20}
  else if(ratio<1){label='Desafío';color='var(--gold)';pct=50}
  else if(ratio<1.6){label='Peligroso';color='var(--orange)';pct=75}
  else{label='Mortal';color='var(--red)';pct=100}
  if(count===0){label='Sin enemigos';color='var(--ink4)';pct=0}
  var h='<div class="difficulty-meter"><div class="flex-between"><div class="form-label" style="margin:0">DIFICULTAD ESTIMADA</div><div style="font-size:14px;font-weight:700;color:'+color+'">'+label+'</div></div>';
  h+='<div class="diff-meter-bar"><div class="diff-meter-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';
  h+='<div style="font-size:12px;color:var(--ink3);margin-top:4px">'+count+' enemigo'+(count!==1?'s':'')+' · '+totalHp+' HP total · '+players+' jugadores</div></div>';
  return h;
}

function renderWizCreaturePicker(q){
  var w=sceneWizard;
  var creatures=applyFilters(allCreatures(),wizFilters,q||'');
  var totalC=allCreatures().length;
  if(!creatures.length)return'<div class="bestiary-count">Mostrando 0 de '+totalC+' criaturas</div><div style="font-size:13px;color:var(--ink4);padding:8px">Ninguna criatura coincide con los filtros.</div>';
  var h='<div class="bestiary-count">Mostrando '+creatures.length+' de '+totalC+' criaturas</div>';
  creatures.forEach(function(c){
    var already=w.creatureIds.find(function(ci){return ci.creatureId===c.id});
    h+='<div class="wiz-picker-item" data-action="wz-add-creature" data-cid="'+c.id+'"><div><span style="font-weight:600">'+esc(c.name)+'</span>'+(c._base?' <span class="base-lock">🔒</span>':'')+' <span class="difficulty-tag diff-'+(c.difficulty||'medium')+'">'+diffLabel(c.difficulty)+'</span>'+(c.role?' '+roleBadge(c.role):'')+'<div style="font-size:12px;color:var(--ink3)">HP '+c.hp+' · '+esc(c.dmg||'')+'</div></div><span style="color:var(--gold);font-size:18px">'+(already?'✓':'+')+'</span></div>';
  });
  return h;
}
function renderWizVillainPicker(){
  var w=sceneWizard;var villains=dbGetAll('villains');var h='';
  villains.forEach(function(v){var already=w.villainIds.indexOf(v.id)>-1;h+='<div class="wiz-picker-item" data-action="wz-add-villain" data-id="'+v.id+'"><div><span style="font-weight:600;color:var(--red)">'+esc(v.name)+'</span><div style="font-size:12px;color:var(--ink3)">'+esc(v.role||'')+' · HP '+(v.stats?v.stats.hp:'?')+'</div></div><span style="color:var(--gold);font-size:18px">'+(already?'✓':'+')+'</span></div>'});
  return h;
}
function renderWizNpcPicker(q){
  var w=sceneWizard;var npcs=dbGetAll('npcs');
  if(q)npcs=npcs.filter(function(n){return n.name.toLowerCase().indexOf(q.toLowerCase())>-1});
  var h='';
  npcs.forEach(function(n){var already=w.npcIds.indexOf(n.id)>-1;h+='<div class="wiz-picker-item" data-action="wz-add-npc" data-id="'+n.id+'"><div><span style="font-weight:600">'+esc(n.name)+'</span><div style="font-size:12px;color:var(--ink3)">'+esc(n.role||'')+'</div></div><span style="color:var(--gold);font-size:18px">'+(already?'✓':'+')+'</span></div>'});
  return h;
}

function filterWizPicker(q,kind){
  if(kind==='creatures')document.getElementById('wiz-picker-creatures').innerHTML=renderWizCreaturePicker(q);
  if(kind==='npcs')document.getElementById('wiz-picker-npcs').innerHTML=renderWizNpcPicker(q);
}
function toggleWizLair(la){var w=sceneWizard;var i=w.lairActions.indexOf(la);if(i>-1)w.lairActions.splice(i,1);else w.lairActions.push(la)}
function addCustomLair(val){val=val.trim();if(!val)return;if(sceneWizard.lairActions.indexOf(val)===-1)sceneWizard.lairActions.push(val);renderSceneWizard()}

function saveSceneWizard(){
  var w=sceneWizard;
  if(!w.name){alert('La escena necesita un nombre');return}
  var item={name:w.name,type:w.type,status:'ready',sporadic:!w.beatId,
    setup:w.setup,
    participants:{npcIds:w.npcIds,creatureIds:w.creatureIds,villainIds:w.villainIds,heroIds:w.heroIds},
    lairActions:w.lairActions,notes:w.notes};
  if(w.id){dbUpdate('scenes',w.id,item)}
  else{item.id='sce-'+uid();dbCreate('scenes',item);if(w.beatId){var camp=dbLoad('campaign');if(camp){(camp.arcs||[]).forEach(function(arc){arc.beats.forEach(function(b){if(b.id===w.beatId)b.scenes.push(item.id)})});dbSave('campaign',camp)}}selectedSceneId=item.id}
  sceneWizard=null;
  closeModal();
  if(w.id||w.beatId)nav('campaign');else{selectedSceneId=item.id;nav('scenes')}
}
function wizardOpenBuilder(){
  var w=sceneWizard;if(!w)return;
  // Capturar lo del paso 1 si estamos ahí (para no perder cambios sin guardar)
  if(w.step===1){saveWizardStep1()}
  if(!w.name){alert('La escena necesita un nombre antes de ir a combate/narrativa');return}
  var item={name:w.name,type:w.type,status:'ready',sporadic:!w.beatId,
    setup:w.setup,
    participants:{npcIds:w.npcIds,creatureIds:w.creatureIds,villainIds:w.villainIds,heroIds:w.heroIds},
    lairActions:w.lairActions,notes:w.notes};
  var targetId;
  if(w.id){
    // Escena existente: actualizar y abrir su vista
    dbUpdate('scenes',w.id,item);
    targetId=w.id;
  } else {
    // Escena nueva: guardar primero, ligar al beat, luego abrir
    item.id='sce-'+uid();
    dbCreate('scenes',item);
    if(w.beatId){var camp=dbLoad('campaign');if(camp){(camp.arcs||[]).forEach(function(arc){arc.beats.forEach(function(b){if(b.id===w.beatId)b.scenes.push(item.id)})});dbSave('campaign',camp)}}
    targetId=item.id;
  }
  sceneWizard=null;
  closeModal();
  openSceneBuilder(targetId);
}

/* INIT */
nav('campaign');

</script>
<style>.content{position:relative}#view-map.active{position:absolute;inset:0;padding:0}</style>
<template id="map-template"><style>
:host{
  --bg:#faf8f4; --surface:#fff; --ink:#2a2620; --ink2:#5a5449; --ink3:#8a8478;
  --accent:#7a5c3e; --accent-light:#f0e9df; --gold:#b8935a; --gold-deep:#a07d47; --border:#e0dcd3;
  --shadow:0 12px 34px rgba(60,50,35,.18);
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;

}
*{box-sizing:border-box}
:host{display:block;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--ink);-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer}

#viewport{position:absolute;inset:0;overflow:hidden;
  background:radial-gradient(130% 130% at 50% 0%, #fffdf9 0%, #f4f0e8 65%, #eae4d8 100%);
  touch-action:none;cursor:grab}
#viewport.grabbing{cursor:grabbing}
#viewport.edit{cursor:crosshair}
#world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#map{display:block;border-radius:6px;
  box-shadow:0 0 0 1px var(--border), 0 22px 55px rgba(60,50,35,.28);
  -webkit-user-drag:none;user-select:none;pointer-events:none}

/* ---- Pines por tipo ---- */
.pin{position:absolute;transform:translate(-50%,-100%) scale(var(--inv,1));
  transform-origin:50% 100%;cursor:pointer;z-index:2}
.pin .beacon{position:relative;width:30px;height:30px;display:grid;place-items:center}
.pin .beacon::before{content:"";position:absolute;width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle, var(--pc,#b8935a) 0%, color-mix(in srgb,var(--pc,#b8935a) 40%, transparent) 45%, transparent 70%);
  opacity:.6;animation:pulse 2.8s ease-in-out infinite}
.pin .disc{position:relative;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;
  font-size:13px;line-height:1;background:var(--surface);border:2px solid var(--pc,#b8935a);
  box-shadow:0 2px 6px rgba(60,50,35,.3)}
.pin .stem{position:absolute;top:27px;left:50%;transform:translateX(-50%);width:2px;height:8px;
  background:linear-gradient(var(--pc,#b8935a),transparent)}
.pin:hover .disc{transform:scale(1.15)}
.pin.sel .disc{box-shadow:0 0 12px 3px color-mix(in srgb,var(--pc,#b8935a) 60%, transparent)}
.pin.portal .disc{width:29px;height:29px;font-size:15px;border-style:double;border-width:4px;box-shadow:0 2px 9px rgba(60,50,35,.42)}
.pin.portal .beacon{width:36px;height:36px}
.pin.portal .beacon::before{width:36px;height:36px}
.pin.portal .stem{top:31px}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.85);opacity:.08}}

/* ---- Popup ---- */
.popup{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);width:236px;
  background:var(--surface);color:var(--ink);border-radius:10px;
  box-shadow:var(--shadow),0 0 0 1px var(--border);opacity:0;pointer-events:none;
  transition:opacity .16s ease, transform .16s ease;z-index:5}
.pin.open .popup{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(-4px)}
.popup::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:14px;height:14px;background:var(--surface);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.popup .pimg{width:100%;height:96px;object-fit:cover;border-radius:10px 10px 0 0;display:block;border-bottom:1px solid var(--border);background:#efe9df}
.popup .pbody{padding:12px 13px 13px}
.popup .ptype{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:999px;margin-bottom:7px;
  background:color-mix(in srgb,var(--pc,#b8935a) 16%, #fff);color:var(--accent);border:1px solid color-mix(in srgb,var(--pc,#b8935a) 42%, #fff)}
.popup .ptitle{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--ink);margin:0 0 4px;line-height:1.2}
.popup .pshort{font-size:14px;line-height:1.45;color:var(--ink2);margin:0 0 10px}
.popup .prow{display:flex;gap:6px;flex-wrap:wrap}
.popup a.pbtn,.popup button.pbtn{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent);
  border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;
  letter-spacing:.2px;text-decoration:none}
.popup .pbtn.enter{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#fff;border:0}
.popup .pbtn:hover{filter:brightness(1.04)}
.popup .pedit{display:block;width:100%;margin-top:8px;background:transparent;border:1px dashed var(--border);
  color:var(--ink3);border-radius:6px;padding:5px;font-size:12px}
.popup .pclose{position:absolute;top:6px;right:6px;z-index:6;width:28px;height:28px;
  display:grid;place-items:center;border:0;border-radius:50%;cursor:pointer;
  font-size:20px;line-height:1;color:var(--ink2);
  background:rgba(255,255,255,.92);box-shadow:0 1px 4px rgba(0,0,0,.18)}
.popup .pclose:hover{color:var(--ink);background:#fff}
.popup .pclose:active{transform:scale(.92)}

/* ---- Barra superior + breadcrumb ---- */
#bar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 14px;background:linear-gradient(180deg,rgba(250,248,244,.97),rgba(250,248,244,.62) 72%,transparent);pointer-events:none}
#bar>*{pointer-events:auto}
.brandwrap{margin-right:auto;min-width:0}
.brand{font-family:var(--serif);font-weight:700;letter-spacing:2px;font-size:18px;color:var(--accent)}
#crumbs{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#crumbs .cb{color:var(--ink3);cursor:pointer;text-decoration:underline}
#crumbs .cb:hover{color:var(--accent)}
#crumbs .cb.here{color:var(--accent);cursor:default;text-decoration:none}
#crumbs .sep{opacity:.55;margin:0 5px}
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:0 2px 8px rgba(60,50,35,.08)}
.seg button{background:transparent;border:0;color:var(--ink3);padding:8px 13px;font-size:12.5px;font-weight:600;letter-spacing:.4px;display:inline-flex;align-items:center;gap:6px}
.seg button.on{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#fff}
.tool{background:var(--surface);border:1px solid var(--border);color:var(--ink2);border-radius:9px;
  padding:8px 12px;font-size:13px;display:inline-flex;align-items:center;gap:7px;box-shadow:0 2px 8px rgba(60,50,35,.08)}
.tool:hover{border-color:var(--accent);color:var(--accent)}
.tool.icon{padding:8px 10px;font-size:15px;min-width:38px;justify-content:center}
.tool.on{border-color:var(--gold);color:var(--accent)}
@media (max-width:680px){.brand{font-size:16px}.tool .lbl{display:none}.tool{padding:8px 10px}}

/* ---- Panel de capas ---- */
#layers{position:absolute;top:64px;left:14px;z-index:19;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px;width:240px;box-shadow:var(--shadow);display:none}
#layers.open{display:block}
#layers .lyhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
#layers .ftitle{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
#layers .lylegend{font-size:10px;color:var(--ink3)}
.lyrow{display:flex;align-items:center;gap:4px;border-radius:8px;padding:1px}
.lyrow.active{background:var(--accent-light)}
.lyeye{width:30px;height:30px;border-radius:7px;border:0;background:transparent;font-size:14px;opacity:.35}
.lyeye.on{opacity:1}
.lyeye:hover{background:rgba(0,0,0,.05)}
.lyname{flex:1;display:flex;align-items:center;gap:8px;background:transparent;border:0;color:var(--ink);font-size:14px;text-align:left;padding:7px 4px;border-radius:7px}
.lyname:hover{background:rgba(0,0,0,.05)}
.lyname .lyico{font-size:15px}
.lyactive{width:20px;text-align:center;color:var(--accent);font-size:13px;font-weight:700}
#typeSub{margin-top:10px;border-top:1px solid var(--border);padding-top:9px}
#typeSub .subttl{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
#layers .fall{font-size:11px;color:var(--ink3);background:none;border:0;text-decoration:underline;margin-top:6px;padding-left:4px}
.fchip{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:0;color:var(--ink);
  padding:6px 6px;border-radius:7px;font-size:14px;text-align:left}
.fchip:hover{background:var(--accent-light)}
.fchip .fico{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px;
  background:var(--surface);border:2px solid var(--pc);flex:none}
.fchip .flabel{flex:1}
.fchip .fdot{width:9px;height:9px;border-radius:50%;border:1px solid var(--pc);flex:none;background:var(--pc)}
.fchip.off{opacity:.42}
.fchip.off .fdot{background:transparent}

/* ---- Zoom ---- */
#zoom{position:absolute;right:14px;bottom:16px;z-index:20;display:flex;flex-direction:column;gap:6px}
#zoom button{width:42px;height:42px;font-size:20px;border-radius:11px}

/* ---- Hint ---- */
#hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:15;background:var(--surface);
  border:1px solid var(--border);color:var(--accent);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
#hint.show{opacity:1}

/* ---- Panel de lore ---- */
#lore{position:absolute;top:0;right:0;height:100%;width:min(420px,92vw);z-index:30;
  background:linear-gradient(180deg,#fffdf9,var(--bg));color:var(--ink);
  box-shadow:-14px 0 44px rgba(60,50,35,.22);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.1,1);
  display:flex;flex-direction:column;border-left:3px solid var(--gold)}
#lore.open{transform:translateX(0)}
#lore .lhead{padding:22px 24px 14px;border-bottom:1px solid var(--border);position:relative}
#lore .leyebrow{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
#lore h2{font-family:var(--serif);font-weight:700;font-size:26px;color:var(--ink);margin:6px 40px 0 0;line-height:1.15}
#lore .limg{width:100%;height:170px;object-fit:cover;background:#efe9df}
#lore .lbody{padding:20px 24px 40px;overflow:auto;font-size:16px;line-height:1.7;color:var(--ink2);white-space:pre-wrap}
#lore .lclose{position:absolute;top:12px;right:12px;background:none;border:0;font-size:26px;color:var(--ink3);line-height:1;z-index:5;padding:6px 12px;cursor:pointer;pointer-events:auto;border-radius:8px}
#lore .lclose:hover{color:var(--ink);background:rgba(0,0,0,.05)}
#lore .lclose:hover{color:var(--ink)}

/* ---- Modales ---- */
.scrim{position:absolute;inset:0;z-index:40;background:rgba(42,38,32,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:18px}
.scrim.open{display:flex}
.sheet{background:var(--surface);color:var(--ink);width:min(460px,100%);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;max-height:92vh;display:flex;flex-direction:column}
.sheet h3{font-family:var(--serif);font-weight:700;font-size:19px;color:var(--ink);margin:0;padding:18px 20px 4px}
.sheet .sub{padding:0 20px 14px;color:var(--ink3);font-size:13px}
.sheet .form{padding:4px 20px 8px;overflow:auto}
.field{margin-bottom:13px}
.field label{display:block;font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.field input,.field textarea{width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:var(--sans);font-size:15px;color:var(--ink)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;line-height:1.5}
.field .tip{font-size:12px;color:var(--ink3);margin-top:4px}
.typepick{display:flex;flex-wrap:wrap;gap:6px}
.typepick button{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:999px;padding:5px 10px;font-size:12.5px;color:var(--ink2)}
.typepick button .ti{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:11px;background:var(--surface);border:2px solid var(--pc)}
.typepick button.on{border-color:var(--pc);background:color-mix(in srgb,var(--pc) 14%,#fff);color:var(--ink);font-weight:600}
.sheet .actions{display:flex;gap:8px;padding:12px 20px 18px;border-top:1px solid var(--border);flex-wrap:wrap}
.btn{border:0;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;letter-spacing:.2px}
.btn.primary{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#fff;flex:1}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--ink2)}
.btn.danger{background:transparent;border:1px solid #b5533f;color:#a3402c;margin-left:auto}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;white-space:pre;width:100%;height:200px;background:#f4f0e8;color:#4a4335;border:1px solid var(--border);border-radius:8px;padding:12px;resize:none}

@media (prefers-reduced-motion: reduce){.pin .beacon::before{animation:none}#lore,.popup{transition:none}}
/* ---- Overlay SVG (áreas y rutas) ---- */
#overlay{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
#overlay polygon,#overlay polyline,#overlay circle{pointer-events:auto}
#overlay text{pointer-events:none;user-select:none}

/* ---- Barra de dibujo ---- */
#draftbar{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:22;display:none;
  align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:8px 10px;box-shadow:var(--shadow);max-width:94vw;flex-wrap:wrap;justify-content:center}
#draftbar.show{display:flex}
#draftbar #draftInfo{font-size:13px;color:var(--ink2);padding:0 6px;font-weight:600}
#draftbar .tool{box-shadow:none;padding:7px 11px}

/* ---- Swatches de color ---- */
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatches button{width:26px;height:26px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--border);cursor:pointer}
.swatches button.on{box-shadow:0 0 0 2px var(--accent)}

@media (max-width:900px){#bar .brand{font-size:16px}}

/* ---- Conexiones ---- */
.links-list{display:flex;flex-direction:column;gap:5px}
.links-none{font-size:12.5px;color:var(--ink3);font-style:italic}
.link-chip{display:flex;align-items:center;gap:7px;background:var(--accent-light);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-size:13px;color:var(--ink)}
.link-chip .lk-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-chip .lk-x{background:none;border:0;color:var(--ink3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1}
.link-chip .lk-x:hover{color:#a3402c}
.link-results{max-height:300px;overflow:auto;margin-top:10px;display:flex;flex-direction:column;gap:3px}
.link-res{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;background:#fff;border:1px solid var(--border);cursor:pointer;font-size:13.5px;text-align:left;color:var(--ink)}
.link-res:hover{background:var(--accent-light);border-color:var(--accent)}
.link-res .lk-kind{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.link-res.added{opacity:.45}
.lore-conns{padding:0 24px 34px}
.lore-conns .lc-ttl{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin:6px 0 8px}
.lore-conn{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:6px;cursor:pointer;font-size:14px;color:var(--ink)}
.lore-conn:hover{border-color:var(--accent);background:var(--accent-light)}
</style>

<script>window.EpicMapInit=function(root){

"use strict";

/* ---------- Tipos ---------- */
var TYPES={
  city:{label:"Ciudad",icon:"🏰",color:"#e2b452"},
  fort:{label:"Fortaleza",icon:"🛡️",color:"#c98a3c"},
  artifact:{label:"Artefacto",icon:"💎",color:"#5fb3d9"},
  lore:{label:"Lore drop",icon:"📜",color:"#cbb24e"},
  ruin:{label:"Ruina",icon:"🏚️",color:"#9a8f7a"},
  danger:{label:"Peligro",icon:"☠️",color:"#c94f3d"},
  region:{label:"Región",icon:"🚩",color:"#7ba05b"},
  port:{label:"Puerto/mar",icon:"⚓",color:"#4f93a8"},
  submap:{label:"Submapa",icon:"🗺️",color:"#7a6cae"}
};
var TYPE_KEYS=Object.keys(TYPES);

/* ---------- Mapas ---------- */
var uid=0;
function makeMap(name,src,pins){return {name:name,src:src,w:1040,h:992,pins:pins||[],areas:[],routes:[]};}
function P(x,y,type,title,short,lore,extra){return Object.assign({id:++uid,x:x,y:y,type:type,title:title,short:short,lore:lore,img:"",sub:null},extra||{});}


var ROOT=makeMap("Avelir","assets/maps/avelir-main.jpg",[
  P(0.685,0.40,"city","Bastión de la Corona","La gran ciudad amurallada, corazón político de Avelir.","Bastión de la Corona se alza junto al lago del este, sus murallas coronadas de estandartes. Aquí gobierna el consejo y parten las caravanas.\n\n(Texto de ejemplo.)"),
  P(0.905,0.215,"danger","El Coloso Ardiente","Volcán vivo que humea sobre el este.","El Coloso nunca duerme del todo; su lava alimenta las forjas de la montaña.\n\n(Texto de ejemplo.)"),
  P(0.415,0.365,"port","El Gran Lago","El corazón de agua dulce de Avelir.","Sus aguas quietas reflejan el cielo como un espejo de plata.\n\n(Texto de ejemplo.)"),
  P(0.12,0.30,"fort","Atalaya del Oeste","Fortaleza que vigila la costa.","(Texto de ejemplo.)"),
  P(0.55,0.30,"artifact","El Fragmento","Reliquia de origen desconocido.","(Texto de ejemplo.)"),
  P(0.50,0.55,"lore","Estela Rúnica","Una piedra cubierta de símbolos.","(Texto de ejemplo.)"),
  P(0.62,0.64,"ruin","Ruinas de Vael","Vestigios de una ciudad perdida.","(Texto de ejemplo.)")
]);

/* ---------- Estado ---------- */
try{var _saved=(window.dbLoad?dbLoad('mapdata'):null); if(_saved&&_saved.pins){ROOT=_saved;}}catch(e){}
ROOT.src="assets/maps/avelir-main.jpg";
var stack=[ROOT];
function _maxId(mp,mx){(mp.pins||[]).forEach(function(p){if(p.id>mx)mx=p.id;if(p.sub)mx=_maxId(p.sub,mx);});(mp.areas||[]).forEach(function(a){if(a.id>mx)mx=a.id;});(mp.routes||[]).forEach(function(r){if(r.id>mx)mx=r.id;});return mx;}
uid=_maxId(ROOT,0);
function persist(){try{if(window.dbSave)dbSave('mapdata',stack[0]);}catch(e){}}
function cur(){return stack[stack.length-1];}
var state={zoom:1,panX:0,panY:0,mode:"view",active:"places",visible:{places:true,faction:false,religion:false,trade:false,transport:false},openId:null,editingId:null,hidden:{},subFileData:null,draft:null,shape:null};
var MAPS_LIST=[];
function loadMapsList(){try{fetch("assets/maps/maps.json").then(function(r){return r.json();}).then(function(a){if(Array.isArray(a))MAPS_LIST=a;}).catch(function(){});}catch(e){}}
loadMapsList();
var editLinks=[];
var CONN_ICON={wiki:"📄",session:"📔",scene:"🎬",creature:"🐾",player:"🧙"};
function connLabel(k){return {wiki:"Wiki",session:"Sesión",scene:"Escena",creature:"Criatura",player:"Personaje"}[k]||k;}
function openConn(kind,id,title){
  if(kind==="wiki"){window.currentWikiId=id;window.wikiEditing=false;if(window.nav)nav("wiki");}
  else if(kind==="session"){if(window.nav)nav("journal");}
  else if(window.openConnection){openConnection(kind,id,title);}
}
function renderLinksList(){
  var el=root.getElementById("fLinksList");
  if(!editLinks.length){el.innerHTML='<div class="links-none">Sin conexiones aún.</div>';return;}
  el.innerHTML=editLinks.map(function(l,i){return '<div class="link-chip"><span>'+(CONN_ICON[l.kind]||"🔗")+'</span><span class="lk-title">'+esc(l.title||l.id)+'</span><button type="button" class="lk-x" data-rmlink="'+i+'">×</button></div>';}).join("");
}
function renderLinkResults(q){
  var all=(window.allLinkables?allLinkables():[]);
  q=(q||"").trim().toLowerCase();
  if(q)all=all.filter(function(x){return (x.title||"").toLowerCase().indexOf(q)>-1;});

function pts2str(pts,m){return pts.map(function(p){return (p.x*m.w)+","+(p.y*m.h);}).join(" ");}
function centroid(pts,m){var sx=0,sy=0;pts.forEach(function(p){sx+=p.x;sy+=p.y;});return {x:(sx/pts.length)*m.w,y:(sy/pts.length)*m.h};}
function escSvg(s){return String(s==null?"":s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function labelSVG(pt,text,color){if(!text)return"";
  return '<text x="'+pt.x+'" y="'+pt.y+'" font-family="Georgia,serif" font-weight="700" font-size="15" fill="'+color+'" stroke="#fff" stroke-width="3.5" paint-order="stroke" text-anchor="middle">'+escSvg(text)+'</text>';}
function areaSVG(a){var m=cur(),pts=pts2str(a.pts,m),k=a.kind||"faction";
  var ed=(state.mode==="edit"&&k===state.active), pe="pointer-events:"+(ed?"auto":"none")+";cursor:"+(ed?"pointer":"default");
  if(k==="religion"){

      '<rect width="13" height="13" fill="'+a.color+'" fill-opacity="0.10"/>'+
      '<line x1="0" y1="0" x2="0" y2="13" stroke="'+a.color+'" stroke-width="4" stroke-opacity="0.5"/></pattern></defs>';
    return pat+'<polygon data-area="'+a.id+'" points="'+pts+'" fill="url(#'+pid+')" stroke="'+a.color+'" stroke-width="2.5" stroke-dasharray="3 3" vector-effect="non-scaling-stroke" style="'+pe+'"/>'+
      labelSVG(centroid(a.pts,m),a.name,a.color);
  }
  return '<polygon data-area="'+a.id+'" points="'+pts+'" fill="'+a.color+'" fill-opacity="0.30" stroke="'+a.color+'" stroke-width="2.5" vector-effect="non-scaling-stroke" style="'+pe+'"/>'+
    labelSVG(centroid(a.pts,m),a.name,a.color);}
function routeSVG(r){var m=cur(),k=r.kind||"trade",col=r.color||(k==="transport"?"#4f6a7a":"#b8935a"),s="";
  var ed=(state.mode==="edit"&&k===state.active), pe="pointer-events:"+(ed?"auto":"none")+";cursor:"+(ed?"pointer":"default");

  r.pts.forEach(function(p){s+='<circle data-route="'+r.id+'" cx="'+(p.x*m.w)+'" cy="'+(p.y*m.h)+'" r="5" fill="#fff" stroke="'+col+'" stroke-width="2.5" vector-effect="non-scaling-stroke" style="'+pe+'"/>';});
  if(r.pts.length)s+=labelSVG({x:r.pts[0].x*m.w,y:r.pts[0].y*m.h-10},r.name,col);
  return s;}
function draftSVG(d){var m=cur();if(!d.pts.length)return"";
  var s='<polyline points="'+pts2str(d.pts,m)+'" fill="none" stroke="#7a5c3e" stroke-width="2.5" stroke-dasharray="5 5" vector-effect="non-scaling-stroke"/>';
  d.pts.forEach(function(p){s+='<circle cx="'+(p.x*m.w)+'" cy="'+(p.y*m.h)+'" r="5" fill="#fff" stroke="#7a5c3e" stroke-width="2.5" vector-effect="non-scaling-stroke"/>';});

/* ---------- Pan + pinch ---------- */
var ptrs=new Map(),moved=0,lastPan=null,pinch=null;
vp.addEventListener("pointerdown",function(e){
  if(e.target.closest("#bar,#zoom,#lore,.scrim,.pin,#filters,#draftbar"))return;
  vp.setPointerCapture(e.pointerId); ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY}); moved=0;
  if(ptrs.size===1){lastPan={x:e.clientX,y:e.clientY};vp.classList.add("grabbing");}
  else if(ptrs.size===2){startPinch();lastPan=null;}
});
vp.addEventListener("pointermove",function(e){
  if(!ptrs.has(e.pointerId))return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2&&pinch){doPinch();return;}
  if(lastPan){var dx=e.clientX-lastPan.x,dy=e.clientY-lastPan.y;moved+=Math.abs(dx)+Math.abs(dy);
    state.panX+=dx;state.panY+=dy;lastPan={x:e.clientX,y:e.clientY};apply();}
});
function endPtr(e){
  if(!ptrs.has(e.pointerId))return;
  var wasTap=(moved<6&&ptrs.size===1);
  ptrs.delete(e.pointerId); vp.classList.remove("grabbing");
  if(ptrs.size<2)pinch=null;
  if(ptrs.size===1){var only=ptrs.values().next().value;lastPan={x:only.x,y:only.y};}else lastPan=null;
  if(wasTap&&loreEl.classList.contains("open")&&!e.target.closest(".pin")){
    loreEl.classList.remove("open");
    if(state.mode==="view"&&state.openId){state.openId=null;renderPins();}
    return;
  }
  if(wasTap&&state.mode==="edit"&&!e.target.closest(".pin,#bar,#zoom,.scrim,#lore,#filters,#draftbar")){
    var r=vp.getBoundingClientRect(),m=cur();
    var wx=(e.clientX-r.left-state.panX)/state.zoom, wy=(e.clientY-r.top-state.panY)/state.zoom;
    var nx=clamp(wx/m.w,0,1), ny=clamp(wy/m.h,0,1);
    if(state.active==="places"){ openEdit(null,nx,ny); }
    else {
      var cfg=LENS_CFG[state.active];
      var areaEl=e.target.closest("[data-area]"), routeEl=e.target.closest("[data-route]");
      if(!state.draft&&cfg&&cfg.group==="area"&&areaEl){ editShapeById("area",+areaEl.dataset.area); }
      else if(!state.draft&&cfg&&cfg.group==="route"&&routeEl){ editShapeById("route",+routeEl.dataset.route); }
      else if(cfg){ if(!state.draft)state.draft={group:cfg.group,kind:cfg.kind,pts:[]}; state.draft.pts.push({x:nx,y:ny}); renderPins(); }
    }
  } else if(wasTap&&state.mode==="view"&&!e.target.closest(".pin")){if(loreEl.classList.contains("open"))loreEl.classList.remove("open");if(state.openId){state.openId=null;renderPins();}}
}
vp.addEventListener("pointerup",endPtr); vp.addEventListener("pointercancel",endPtr);
function twoPts(){return Array.from(ptrs.values()).slice(0,2);}
function startPinch(){var p=twoPts();if(p.length<2)return;var dx=p[1].x-p[0].x,dy=p[1].y-p[0].y;
  pinch={dist:Math.hypot(dx,dy),zoom:state.zoom,cx:(p[0].x+p[1].x)/2,cy:(p[0].y+p[1].y)/2};}
function doPinch(){var p=twoPts();if(p.length<2||!pinch)return;var dx=p[1].x-p[0].x,dy=p[1].y-p[0].y;
  var dist=Math.hypot(dx,dy),r=vp.getBoundingClientRect();
  zoomAt(pinch.cx-r.left,pinch.cy-r.top,(dist/pinch.dist)*(pinch.zoom/state.zoom));}
vp.addEventListener("wheel",function(e){e.preventDefault();var r=vp.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
